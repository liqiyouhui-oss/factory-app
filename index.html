<div id="alarm-banner">
  <span id="alarm-msg"></span>
  &nbsp;&nbsp;
  <button onclick="dismissAlarm()" style="background:#ffffff22;border:1px solid #ffffff44;border-radius:6px;color:inherit;padding:3px 12px;font-size:12px;font-weight:700;cursor:pointer">確認した</button>

</div>
<div id="app"></div>
<script>
/* ============================================================
   工程管理アプリ フロントエンド v2 (Python+Excel版)
   改修項目：
     ① 加工②が空ならプレビューで非表示
     ② 保守値の表示改善（空工程の場合は単一時間表示）
     ④ 置き場在庫×削除、「未投入」表記削除
     ⑤ 日報に残業時間欄、マスタから残業削除
     ⑥ 納期閾値変更（余裕:30+日、注意:14-30日、要注意:0-14日）
     ⑦ 社内検査→立会検査の順に変更
     ⑧ 保守値を目立たせる表示
   ============================================================ */

const PASS='1234';
const SK='factory_py_v1', MK='factory_masters_v1', TK='factory_time_v1', DK='factory_daily_v1', CK='factory_cal_v1';
const ALARM_KEY='factory_alarm_setting', ALARM_DISMISS_KEY='factory_alarm_dismiss';
const TEAMS=['1班','2班','3班'];
const ROLES=['職長','班長','作業員'];
const SKILL_LABELS=['','見習い','初級','中級','上級','エキスパート'];
const TEAM_COLORS={'1班':'#6366f1','2班':'#06b6d4','3班':'#10b981','':'#334155'};
const ROLE_CLS={'職長':'role-shokucho','班長':'role-hancho','作業員':'role-worker'};
const STORAGE_PLACES=['東工場','整正場','D倉庫','サンドブラスト'];

/* ===== HELPERS ===== */
const todayStr=()=>new Date().toISOString().slice(0,10);
const addDays=(d,n)=>{try{const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}catch(e){return d}};
const diffDays=d=>{if(!d)return null;try{return Math.ceil((new Date(d)-new Date(todayStr()))/(864e5))}catch(e){return null}};
const fmt=d=>{if(!d||typeof d!=='string')return'未設定';const p=d.split('-');if(p.length<3)return'未設定';return`${p[1]}/${p[2]}`};
const fmtFull=d=>{if(!d||typeof d!=='string')return'未設定';const p=d.split('-');if(p.length<3)return'未設定';return`${p[0]}/${p[1]}/${p[2]}`};
const fmtMD=d=>{if(!d||typeof d!=='string')return'―';const p=d.split('-');if(p.length<3)return'―';const dw=['日','月','火','水','木','金','土'][new Date(d+'T00:00:00').getDay()];return`${parseInt(p[1])}/${parseInt(p[2])}(${dw})`};
const hhmm=h=>{if(!h||h<=0)return'―';const hh=Math.floor(h);const mm=Math.round((h-hh)*60);return mm>0?`${hh}h${mm}m`:`${hh}h`};
const toMin=t=>{if(!t)return 0;const p=t.split(':');if(p.length<2)return 0;return(parseInt(p[0])||0)*60+(parseInt(p[1])||0)};
let _uid=Date.now();
const uid=()=>++_uid;
const esc=s=>{if(s===null||s===undefined)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')};

/* 【指摘A】休日判定：日曜日 または カレンダーで休日設定された日 */
const isHoliday=d=>{
  if(!d||typeof d!=='string')return false;
  try{
    /* 日曜日は常に休日 */
    const dow=new Date(d+'T00:00:00').getDay();
    if(dow===0)return true;
    /* カレンダーの休日イベントを参照 */
    return (calEvents||[]).some(e=>e.date===d&&e.type==='holiday');
  }catch(e){return false;}
};

/* 【指摘A】稼働日数の残り：今日から指定日まで、休日を除外した日数 */
const workingDaysUntil=d=>{
  if(!d||typeof d!=='string')return null;
  try{
    const total=diffDays(d);
    if(total===null)return null;
    /* 0日以下なら休日計算せずそのまま返す（超過扱い） */
    if(total<=0)return total;
    let count=0;
    const today=todayStr();
    for(let i=1;i<=total;i++){
      const chk=addDays(today,i);
      if(!isHoliday(chk))count++;
    }
    return count;
  }catch(e){return null;}
};

/* 【指摘D】指定時間後に完了する日付を「稼働日」ベースで計算
   totalH = 必要な合計時間(h)
   dh = 1日の実稼働時間(h) */
const calcFinishDate=(totalH,dh)=>{
  if(!totalH||totalH<=0||!dh||dh<=0)return '';
  try{
    const reqDays=Math.ceil(totalH/dh);
    const today=todayStr();
    let count=0;
    let cur=today;
    let safety=0;
    /* 最大1000日まで探索 */
    while(count<reqDays&&safety<1000){
      cur=addDays(cur,1);
      if(!isHoliday(cur))count++;
      safety++;
    }
    return cur;
  }catch(e){return '';}
};

/* 日付セレクト: value が空なら「未選択」状態にする（ユーザーに選択を促す）
   data-key で S.form のキー名を指定すると、変更時に S.form へ自動反映する */
function makeDateSelects(prefix,val,formKey){
  const today=new Date();
  let y='',m='',d='';
  const hasVal=val&&typeof val==='string'&&val.length>=8;
  if(hasVal){
    const p=val.split('-');
    if(p.length>=3){y=parseInt(p[0])||'';m=parseInt(p[1])||'';d=parseInt(p[2])||'';}
  }
  const curY=today.getFullYear();
  const keyAttr=formKey?` data-formkey="${formKey}"`:'';
  let ys=`<option value="">年</option>`;for(let i=curY-1;i<=curY+5;i++)ys+=`<option value="${i}"${y===i?' selected':''}>${i}年</option>`;
  let ms=`<option value="">月</option>`;for(let i=1;i<=12;i++)ms+=`<option value="${i}"${m===i?' selected':''}>${i}月</option>`;
  let ds=`<option value="">日</option>`;for(let i=1;i<=31;i++)ds+=`<option value="${i}"${d===i?' selected':''}>${i}日</option>`;
  return `<div class="date-selects">
    <select id="${prefix}-y" class="date-sel"${keyAttr} data-prefix="${prefix}">${ys}</select>
    <select id="${prefix}-m" class="date-sel"${keyAttr} data-prefix="${prefix}" style="flex:.7">${ms}</select>
    <select id="${prefix}-d" class="date-sel"${keyAttr} data-prefix="${prefix}" style="flex:.6">${ds}</select>
  </div>`;
}
function getDateVal(prefix){
  const yEl=document.getElementById(`${prefix}-y`);
  const mEl=document.getElementById(`${prefix}-m`);
  const dEl=document.getElementById(`${prefix}-d`);
  if(!yEl||!mEl||!dEl)return'';
  const y=yEl.value;const m=String(mEl.value||'').padStart(2,'0');const d=String(dEl.value||'').padStart(2,'0');
  return y&&m&&d?`${y}-${m}-${d}`:'';
}
window.adjustDays=prefix=>{
  try{
    const yEl=document.getElementById(`${prefix}-y`);
    const mEl=document.getElementById(`${prefix}-m`);
    const dSel=document.getElementById(`${prefix}-d`);
    if(!yEl||!mEl||!dSel)return;
    const y=parseInt(yEl.value||new Date().getFullYear());
    const m=parseInt(mEl.value||1);
    const maxD=new Date(y,m,0).getDate();
    const cur=parseInt(dSel.value)||1;
    const newD=cur>maxD?maxD:cur;
    let opts='';for(let i=1;i<=maxD;i++)opts+=`<option value="${i}"${i===newD?' selected':''}>${i}日</option>`;
    dSel.innerHTML=opts;
  }catch(e){console.error('adjustDays error:',e);}
};

/* ===== IndexedDB ストレージ ===== */
/* 静的版：データはこのスマホ/PC内のIndexedDBに保存される。
   サーバーに送信されないため、機密情報も安全。 */
const IDB_NAME='factory_app_db';
const IDB_STORE='kv';
const IDB_VER=1;
let _idb=null;
function _openIDB(){
  if(_idb)return Promise.resolve(_idb);
  return new Promise((resolve,reject)=>{
    try{
      const req=indexedDB.open(IDB_NAME,IDB_VER);
      req.onupgradeneeded=()=>{
        const db=req.result;
        if(!db.objectStoreNames.contains(IDB_STORE))db.createObjectStore(IDB_STORE);
      };
      req.onsuccess=()=>{_idb=req.result;resolve(_idb);};
      req.onerror=()=>reject(req.error);
      req.onblocked=()=>reject(new Error('IndexedDB blocked'));
    }catch(e){reject(e);}
  });
}
async function idbGet(key){
  try{
    const db=await _openIDB();
    return await new Promise((resolve,reject)=>{
      const tx=db.transaction(IDB_STORE,'readonly');
      const st=tx.objectStore(IDB_STORE);
      const r=st.get(key);
      r.onsuccess=()=>resolve(r.result===undefined?null:r.result);
      r.onerror=()=>reject(r.error);
    });
  }catch(e){console.error('[idbGet]',key,e);return null;}
}
async function idbSet(key,value){
  try{
    const db=await _openIDB();
    return await new Promise((resolve,reject)=>{
      const tx=db.transaction(IDB_STORE,'readwrite');
      const st=tx.objectStore(IDB_STORE);
      const r=st.put(value,key);
      r.onsuccess=()=>resolve(true);
      r.onerror=()=>reject(r.error);
    });
  }catch(e){console.error('[idbSet]',key,e);return false;}
}
async function idbAllKeys(){
  try{
    const db=await _openIDB();
    return await new Promise((resolve,reject)=>{
      const tx=db.transaction(IDB_STORE,'readonly');
      const st=tx.objectStore(IDB_STORE);
      const r=st.getAllKeys();
      r.onsuccess=()=>resolve(r.result||[]);
      r.onerror=()=>reject(r.error);
    });
  }catch(e){console.error('[idbAllKeys]',e);return [];}
}
async function idbClear(){
  try{
    const db=await _openIDB();
    return await new Promise((resolve,reject)=>{
      const tx=db.transaction(IDB_STORE,'readwrite');
      const st=tx.objectStore(IDB_STORE);
      const r=st.clear();
      r.onsuccess=()=>resolve(true);
      r.onerror=()=>reject(r.error);
    });
  }catch(e){console.error('[idbClear]',e);return false;}
}

/* 既存コードとの互換: apiGet/apiSet をIndexedDB版に置き換え */
async function apiGet(key){return await idbGet(key);}
function apiSet(key,value){
  /* 既存呼び出し側がPromiseを待つケース・待たないケース両方に対応 */
  return idbSet(key,value).catch(e=>{console.error('[apiSet]',key,e);return false;});
}

/* ===== MASTERS ===== */
/* 【改修⑤】workSettings から overtime を削除（残業時間は日報で管理） */
const defMasters=()=>({
  workers:[],machines:[],
  workSettings:{startTime:'08:00',endTime:'17:00',breaks:[
    {id:1,start:'10:00',end:'10:10'},
    {id:2,start:'12:00',end:'12:45'},
    {id:3,start:'15:00',end:'15:10'}
  ]}
});

/* 既存の breaks に 12:00-12:45 が無ければ自動追加 */
const migrateBreaks=ws=>{
  if(!ws||!Array.isArray(ws.breaks))return ws;
  const has=ws.breaks.some(b=>b.start==='12:00'&&b.end==='12:45');
  if(!has){
    const maxId=ws.breaks.reduce((m,b)=>Math.max(m,parseInt(b.id)||0),0);
    ws.breaks.push({id:maxId+1,start:'12:00',end:'12:45'});
    /* 開始時刻でソート */
    ws.breaks.sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  }
  return ws;
};
let masters=defMasters();
const saveMasters=()=>apiSet(MK,masters);
/* 【改修⑤】残業時間は勤務設定には含めない（日報で管理）。calcDailyHは勤務時間のみ */
const calcDailyH=()=>{
  try{
    const ws=masters.workSettings||{};
    let t=toMin(ws.endTime||'17:00')-toMin(ws.startTime||'08:00');
    (ws.breaks||[]).forEach(b=>{t-=toMin(b.end)-toMin(b.start);});
    return Math.max(0,t/60);
  }catch(e){console.error('calcDailyH error:',e);return 8;}
};
const machineName=id=>{const m=(masters.machines||[]).find(x=>x.id==id);return m?m.name:'';};
const workerById=id=>(masters.workers||[]).find(w=>w.id==id)||null;
const workerName=id=>{const w=workerById(id);return w?w.name:'';};

/* ===== TIME HINTS ===== */
let timeDB={};
const saveTDB=()=>apiSet(TK,timeDB);

/* 【改修③】machineId（カンマ区切り文字列）→ machineIds（配列）相互変換ヘルパー */
const parseMachineIds=v=>{
  if(Array.isArray(v))return v.map(x=>String(x)).filter(x=>x);
  if(v==null||v==='')return [];
  return String(v).split(',').map(x=>x.trim()).filter(x=>x);
};
const stringifyMachineIds=arr=>{
  if(!Array.isArray(arr))return arr||'';
  return arr.filter(x=>x).join(',');
};
/* 機械IDの配列から機械名を結合して返す */
const machineNamesFromIds=ids=>{
  const arr=parseMachineIds(ids);
  return arr.map(id=>machineName(id)).filter(n=>n).join('・');
};
/* 機械種別の一覧を取得（重複排除） */
const machineTypes=()=>{
  const types=new Set();
  (masters.machines||[]).forEach(m=>{if(m.type)types.add(m.type);});
  return Array.from(types).sort();
};
/* 【改修④】時間/個プルダウン用の選択肢 */
const HPU_VALUES=[0.1,0.25,0.5,0.75,1,1.5,2,3,4,5,6,8,10,12,16,24];
/* 【改修③④】defStep: machineId→空文字（カンマ区切り）, hoursPerUnitUnit追加 */

/* 旧データのマイグレーション */
const migrate=o=>{
  if(!o||typeof o!=='object')return blankOrder();
  const base={...o};
  if(!Array.isArray(o.group1)||!Array.isArray(o.group2)){
    const steps=Array.isArray(o.steps)?o.steps:[];
    base.group1=steps.length>0?[{...steps[0]}]:[defStep('加工１')];
    base.group2=steps.length>1?steps.slice(1).map(s=>({...s})):[defStep('加工２')];
    delete base.steps;delete base.polish;
  }
  if(base.heatTreatReturnDate===undefined)base.heatTreatReturnDate='';
  if(base.outsourceReturnDate===undefined)base.outsourceReturnDate='';
  if(!base.storageQty||typeof base.storageQty!=='object')base.storageQty={};
  if(base.product===undefined)base.product='';
  if(base.productId===undefined)base.productId='';
  if(!base.alertDays)base.alertDays=20; /* デフォルト20稼働日 */
  /* 各工程にreworkフィールドを補完 */
  const fixSteps=arr=>(arr||[]).map(s=>{
    const o2={...s};
    if(Array.isArray(o2.machineId))o2.machineId=stringifyMachineIds(o2.machineId);
    else if(o2.machineId==null)o2.machineId='';
    else o2.machineId=String(o2.machineId);
    if(!o2.hoursPerUnitUnit)o2.hoursPerUnitUnit='h';
    if(o2.scheduleHidden===undefined)o2.scheduleHidden=false;
    if(o2.rework===undefined)o2.rework=0;
    delete o2._filterTypes;
    return o2;
  });
  base.group1=fixSteps(base.group1);
  base.group2=fixSteps(base.group2);
  return base;
};

/* 【改修④】時間/個（h or 日）→ h単位に変換 */
const hpuToHours=s=>{
  const v=parseFloat(s.hoursPerUnit);
  if(isNaN(v)||v<=0)return 0;
  const u=s.hoursPerUnitUnit||'h';
  if(u==='日'){
    const dh=calcDailyH()||8;
    return v*dh;
  }
  return v;
};

/* 【改修①】加工②が実質的に空かどうかを判定する関数（hoursPerUnitが全部空） */
const hasGroup2=o=>{
  const g2=o.group2||[];
  if(!g2.length)return false;
  return g2.some(s=>hpuToHours(s)>0);
};

/* 完了判定（手直し考慮：実質完了 = done - rework） */
const isDone=o=>{
  const q=parseInt(o.qty)||0;
  if(!q)return false;
  let allSteps=[...(o.group1||[])];
  if(hasGroup2(o))allSteps=[...allSteps,...(o.group2||[])];
  if(allSteps.length===0)return false;
  return allSteps.every(s=>Math.max(0,(parseInt(s.done)||0)-(parseInt(s.rework)||0))>=q);
};
const isOver=o=>!isDone(o)&&o.deadline&&diffDays(o.deadline)<0;
const isUrgent=o=>!isDone(o)&&o.deadline&&diffDays(o.deadline)>=0&&diffDays(o.deadline)<7;
const sc=r=>r===0?'#475569':r<0.5?'#ef4444':r<1?'#f59e0b':'#10b981';
/* 実質完了率（手直し反映） */
const netDone=s=>Math.max(0,(parseInt(s.done)||0)-(parseInt(s.rework)||0));
const overallRatio=o=>{
  const q=parseInt(o.qty)||0;
  let all=[...(o.group1||[])];
  if(hasGroup2(o))all=[...all,...(o.group2||[])];
  if(!q||!all.length)return 0;
  return all.reduce((s,st)=>s+Math.min(netDone(st),q),0)/(q*all.length);
};

/* 工程の残り時間（手直し考慮） */
const stepRemainH=(s,qty)=>{
  const rem=Math.max(0,qty-netDone(s));
  const hpu=hpuToHours(s);
  const mc=Math.max(1,parseInt(s.machineCount)||1);
  return rem*hpu/mc;
};

/* 熱処理・外注の待ち時間（時間換算） */
const waitH=(o,dh)=>{
  let h=0;
  if(dh<=0)dh=8;
  if(o.heatTreat){
    if(o.heatTreatReturnDate){const d=diffDays(o.heatTreatReturnDate);h+=(d>0?d:0)*dh;}
    else{h+=3*dh;}
  }
  if(o.outsource){
    if(o.outsourceReturnDate){const d=diffDays(o.outsourceReturnDate);h+=(d>0?d:0)*dh;}
    else{h+=3*dh;}
  }
  return h;
};

/* 【改修②】計算ロジック */
const calcOptimistic=(o,dh)=>{
  const q=parseInt(o.qty)||0;if(!q)return 0;
  const g1H=(o.group1||[]).reduce((s,st)=>s+stepRemainH(st,q),0);
  if(!hasGroup2(o))return g1H+waitH(o,dh);
  const g2=o.group2||[];
  const g2Last=g2[g2.length-1];
  const hpu=hpuToHours(g2Last||{});
  const mc=Math.max(1,parseInt(g2Last?.machineCount)||1);
  const g2LastH=hpu/mc;
  return g1H+waitH(o,dh)+g2LastH;
};
const calcPessimistic=(o,dh)=>{
  const q=parseInt(o.qty)||0;if(!q)return 0;
  const g1H=(o.group1||[]).reduce((s,st)=>s+stepRemainH(st,q),0);
  if(!hasGroup2(o))return g1H+waitH(o,dh);
  const g2H=(o.group2||[]).reduce((s,st)=>s+stepRemainH(st,q),0);
  return g1H+waitH(o,dh)+g2H;
};
const calcRemaining=o=>{const dh=calcDailyH();return calcPessimistic(o,dh);};

/* 【指摘B】検査・納期のうち近い方を「目標日」として使う
   戻り値: {targetDate, targetLabel, isInspection} */
const getTargetDate=o=>{
  const deadline=o.deadline||null;
  /* 検査日がある場合：立会/社内のうち早い方 */
  const inspDates=[];
  if(o.inspection&&o.inspectionDate)inspDates.push({date:o.inspectionDate,label:'立会検査'});
  if(o.internalInspection&&o.internalInspectionDate)inspDates.push({date:o.internalInspectionDate,label:'社内検査'});
  inspDates.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const earliestInsp=inspDates[0];
  /* 検査・納期のうち近い方を選ぶ */
  if(earliestInsp&&deadline){
    return earliestInsp.date<=deadline
      ?{targetDate:earliestInsp.date,targetLabel:earliestInsp.label,isInspection:true}
      :{targetDate:deadline,targetLabel:'納期',isInspection:false};
  }
  if(earliestInsp)return{targetDate:earliestInsp.date,targetLabel:earliestInsp.label,isInspection:true};
  if(deadline)return{targetDate:deadline,targetLabel:'納期',isInspection:false};
  return{targetDate:null,targetLabel:'',isInspection:false};
};

/* 【指摘③⑥】納期ラベルは「稼働日（休日除外）ベース」で判定する
   検査がある場合はそちらを優先 */
const feasibility=o=>{
  if(isDone(o))return{cls:'feas-ok',label:'完了',detail:''};
  const dh=calcDailyH();
  const tgt=getTargetDate(o);
  if(!tgt.targetDate)return{cls:'',label:'',detail:''};
  const wdays=workingDaysUntil(tgt.targetDate);
  if(wdays===null)return{cls:'',label:'',detail:''};
  const opt=calcOptimistic(o,dh);
  const pes=calcPessimistic(o,dh);
  const optD=(opt/dh).toFixed(1);
  const pesD=(pes/dh).toFixed(1);
  const detail=hasGroup2(o)
    ?`最短${optD}日 〜 最長${pesD}日 / 残${wdays}稼働日（${tgt.targetLabel}まで）`
    :`必要${pesD}日 / 残${wdays}稼働日（${tgt.targetLabel}まで）`;
  /* 受注ごとのalertDaysを使用 */
  const ad=parseInt(o.alertDays)||20;
  const adHalf=Math.max(1,Math.floor(ad/2));
  if(wdays<0)return{cls:'feas-ng',label:`🚨 ${tgt.targetLabel}超過`,detail};
  if(wdays<adHalf)return{cls:'feas-ng',label:`🚨 要注意（${tgt.targetLabel}まで残り${wdays}稼働日）`,detail};
  if(wdays<ad)return{cls:'feas-tight',label:`⚡ 注意（${tgt.targetLabel}まで残り${wdays}稼働日）`,detail};
  return{cls:'feas-ok',label:'✅ 余裕あり',detail};
};
/* calcRisk は表示用に詳細情報を返す */
const calcRisk=o=>{
  const dh=calcDailyH();
  const tgt=getTargetDate(o);
  if(!tgt.targetDate)return{level:'none',label:'',opt:0,pes:0,daysLeft:null,targetDate:null,targetLabel:'',isInspection:false};
  const wdays=workingDaysUntil(tgt.targetDate);
  const opt=calcOptimistic(o,dh);
  const pes=calcPessimistic(o,dh);
  const ad=parseInt(o.alertDays)||20;
  const adHalf=Math.max(1,Math.floor(ad/2));
  const base={opt,pes,daysLeft:wdays,targetDate:tgt.targetDate,targetLabel:tgt.targetLabel,isInspection:tgt.isInspection};
  if(wdays===null)return{...base,level:'none',label:''};
  if(wdays<0)return{...base,level:'over',label:`🚨 ${tgt.targetLabel}超過`};
  if(wdays<adHalf)return{...base,level:'ng',label:`🚨 要注意（残り${wdays}稼働日）`};
  if(wdays<ad)return{...base,level:'warn',label:`⚡ 注意（残り${wdays}稼働日）`};
  return{...base,level:'ok',label:'✅ 余裕あり'};
};

/* ===== 完了見込み日計算（予定表のscheduleStart基準） =====
   全工程のscheduleStartが揃っている場合のみ計算可能
   戻り値: {date:string|null, status:'ok'|'warn'|'over'|'unset'|'done'} */
function calcOrderFinish(o){
  try{
    if(isDone(o))return{date:null,status:'done'};
    const qty=parseInt(o.qty)||0;
    if(!qty)return{date:null,status:'unset'};
    const holidaySet=getHolidaySet();
    const allSteps=[];
    ['group1','group2'].forEach(gk=>{
      (o[gk]||[]).forEach(s=>{if(hpuToHours(s)>0)allSteps.push(s);});
    });
    if(!allSteps.length)return{date:null,status:'unset'};
    if(!allSteps.every(s=>s.scheduleStart))return{date:null,status:'unset'};
    let latestDate='';
    allSteps.forEach(s=>{
      const wd=calcStepDays(s,qty);
      const end=addWorkdays(s.scheduleStart,wd,holidaySet);
      if(!latestDate||end>latestDate)latestDate=end;
    });
    if(!latestDate)return{date:null,status:'unset'};
    if(!o.deadline)return{date:latestDate,status:'warn'};
    const deadline30=addDays(o.deadline,-30);
    if(latestDate<=deadline30)return{date:latestDate,status:'ok'};
    if(latestDate<=o.deadline)return{date:latestDate,status:'warn'};
    return{date:latestDate,status:'over'};
  }catch(e){console.error('calcOrderFinish error:',e);return{date:null,status:'unset'};}
}
/* 完了見込みバッジHTML */
function finishBadge(o){
  if(isDone(o))return'';
  const fin=calcOrderFinish(o);
  if(fin.status==='unset')return`<span style="background:#1e293b;color:#475569;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700">📭 予定未入力</span>`;
  const styleMap={ok:'background:#052e16;color:#10b981',warn:'background:#422006;color:#f59e0b',over:'background:#450a0a;color:#ef4444'};
  const iconMap={ok:'✅',warn:'⚠️',over:'🚨'};
  return`<span style="${styleMap[fin.status]};border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700">${iconMap[fin.status]} 完了見込${fmtMD(fin.date)}</span>`;
}
/* 上司説明文を自動生成 */
function genReport(o){
  try{
    const qty=parseInt(o.qty)||0;
    const dh=calcDailyH()||8;
    const fin=calcOrderFinish(o);
    const name=o.product||o.seiban||'（品名不明）';
    const allSteps=[];
    ['group1','group2'].forEach(gk=>{
      (o[gk]||[]).forEach(s=>{if(hpuToHours(s)>0)allSteps.push(s);});
    });
    const activeStep=allSteps.find(s=>(parseInt(s.done)||0)<qty)||allSteps[0];
    const rem=activeStep?Math.max(0,qty-(parseInt(activeStep.done)||0)):qty;
    const hpu=activeStep?hpuToHours(activeStep):0;
    const reqDays=activeStep?calcStepDays(activeStep,qty):0;
    let txt=`${name}は残${rem}個`;
    if(hpu>0)txt+=`・1個${hhmm(hpu)}`;
    if(reqDays>0)txt+=`。${reqDays}稼働日必要`;
    if(fin.date)txt+=`で${fmtMD(fin.date)}頃完了見込み`;
    txt+='。';
    if(o.deadline&&fin.date){
      const diffD=dayDiff(fin.date,o.deadline);
      if(diffD>0)txt+=`\n納期${fmtMD(o.deadline)}より${diffD}日早い`;
      else if(diffD<0)txt+=`\n納期${fmtMD(o.deadline)}より${Math.abs(diffD)}日超過見込み`;
      else txt+=`\n納期${fmtMD(o.deadline)}ぴったり`;
    }
    return txt;
  }catch(e){return'（計算エラー）';}
}

/* 【指摘⑥③B】納期ラベル閾値（稼働日ベース、検査優先）
   検査がある場合は検査日までの稼働日数で判定 */
const dlStatus=(o_or_date,done)=>{
  /* 互換：文字列(日付)が渡された場合 */
  if(typeof o_or_date==='string'){
    if(!o_or_date)return{cls:'dl-none',label:'納期未設定'};
    if(done)return{cls:'dl-done',label:'完了'};
    const wd=workingDaysUntil(o_or_date);
    if(wd===null)return{cls:'dl-none',label:'納期未設定'};
    if(wd<0)return{cls:'dl-over',label:`${Math.abs(wd)}日超過`};
    if(wd<10)return{cls:'dl-urgent',label:`残${wd}日`};
    if(wd<20)return{cls:'dl-warn',label:`残${wd}日`};
    return{cls:'dl-ok',label:`残${wd}日`};
  }
  /* オブジェクトが渡された場合（新仕様：検査優先） */
  const o=o_or_date;
  if(done)return{cls:'dl-done',label:'完了'};
  const tgt=getTargetDate(o);
  if(!tgt.targetDate)return{cls:'dl-none',label:'納期未設定'};
  const wd=workingDaysUntil(tgt.targetDate);
  if(wd===null)return{cls:'dl-none',label:'納期未設定'};
  const prefix=tgt.isInspection?'検':'';
  if(wd<0)return{cls:'dl-over',label:`${prefix}${Math.abs(wd)}日超過`};
  if(wd<10)return{cls:'dl-urgent',label:`${prefix}残${wd}日`};
  if(wd<20)return{cls:'dl-warn',label:`${prefix}残${wd}日`};
  return{cls:'dl-ok',label:`${prefix}残${wd}日`};
};

/* アラームは残り7日以内で発動（変更なし） */
let alarmEnabled=true;
let alarmTimer=null;

function loadAlarmSetting(){
  try{const v=localStorage.getItem(ALARM_KEY);alarmEnabled=(v===null)?true:(v==='true');}
  catch(e){alarmEnabled=true;}
}
function saveAlarmSetting(){try{localStorage.setItem(ALARM_KEY,String(alarmEnabled));}catch(e){}}
function isDismissedToday(){
  try{const v=localStorage.getItem(ALARM_DISMISS_KEY);return v===todayStr();}
  catch(e){return false;}
}
window.dismissAlarm=()=>{
  try{localStorage.setItem(ALARM_DISMISS_KEY,todayStr());}catch(e){}
  const b=document.getElementById('alarm-banner');if(b)b.style.display='none';
};
window.toggleAlarmSetting=()=>{
  alarmEnabled=!alarmEnabled;
  saveAlarmSetting();
  if(!alarmEnabled){
    const b=document.getElementById('alarm-banner');if(b)b.style.display='none';
    if(alarmTimer){clearInterval(alarmTimer);alarmTimer=null;}
  }else{startAlarmTimer();checkAlarm();}
  render();
};

function playAlarmSound(strong){
  try{
    const Ctx=window.AudioContext||window.webkitAudioContext;
    if(!Ctx)return;
    const ctx=new Ctx();
    const count=strong?3:2;
    for(let i=0;i<count;i++){
      const o=ctx.createOscillator();const g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=strong?880:660;o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+i*0.4);
      g.gain.linearRampToValueAtTime(0.4,ctx.currentTime+i*0.4+0.05);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+i*0.4+0.3);
      o.start(ctx.currentTime+i*0.4);o.stop(ctx.currentTime+i*0.4+0.3);
    }
  }catch(e){/* 音声エラーは無視 */}
}

function checkAlarm(){
  try{
    if(!alarmEnabled||isDismissedToday())return;
    const overOrders=orders.filter(o=>!isDone(o)&&o.deadline&&diffDays(o.deadline)<0);
    const urgentOrders=orders.filter(o=>!isDone(o)&&o.deadline&&diffDays(o.deadline)>=0&&diffDays(o.deadline)<7);
    const banner=document.getElementById('alarm-banner');
    const msg=document.getElementById('alarm-msg');
    if(!banner||!msg)return;
    if(overOrders.length>0){
      banner.className='over';msg.textContent=`🚨 納期超過 ${overOrders.length}件あります！`;
      banner.style.display='block';playAlarmSound(true);
    }else if(urgentOrders.length>0){
      banner.className='urgent';msg.textContent=`⚡ 納期7日以内 ${urgentOrders.length}件あります`;
      banner.style.display='block';playAlarmSound(false);
    }else{banner.style.display='none';}
  }catch(e){console.error('checkAlarm error:',e);}
}

function startAlarmTimer(){
  if(alarmTimer)clearInterval(alarmTimer);
  alarmTimer=setInterval(checkAlarm,5*60*1000);
}

/* ===== セッション状態の保存・復元 =====
   目的: リロードしても入力中の画面・フォームデータを復元する
   保存先: sessionStorage（タブを閉じると消える。業務データとは別管理）
   保存タイミング: set()が呼ばれるたびに自動保存 */
const SS_KEY='factory_session_v1';
/* 保存対象キー（モーダルなど一時的なUIは除外） */
const SS_SAVE_KEYS=['view','eid','form','groupBy','showDone','showCautionOnly','q',
  'teamFilter','dailyDate','dailyTeam','calYear','calMonth','calSelDate',
  'masterTab','schTeam','schPeriod','schStart','schShowDone',
  'reportTeam','schViewMode','schFilterOpen'];
function saveSession(){
  try{
    const snap={};
    SS_SAVE_KEYS.forEach(k=>{if(k in S)snap[k]=S[k];});
    sessionStorage.setItem(SS_KEY,JSON.stringify(snap));
  }catch(e){/* sessionStorage無効環境でもエラーにしない */}
}
function restoreSession(){
  try{

/* 全IndexedDBキーをJSONにまとめてダウンロード */
window.exportData=async()=>{
  try{
    const keys=await idbAllKeys();
    const data={};
    for(const k of keys){
      const v=await idbGet(k);
      if(v!==null&&v!==undefined)data[k]=v;
    }
    const meta={
      _version:1,
      _exportedAt:new Date().toISOString(),
      _appName:'factory-app',
    };
    const out={...meta,data};
    const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const ts=new Date().toISOString().slice(0,10).replace(/-/g,'');
    a.href=url;
    a.download=`factory-backup-${ts}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    },1000);
    alert('✅ バックアップを保存しました\n\nダウンロードフォルダを確認してください');
  }catch(e){
    console.error('export error:',e);
    alert('❌ バックアップに失敗しました\n\n'+e.message);
  }
};

/* JSONファイルからインポート */
window.importDataFromFile=async file=>{
  try{
    if(!file)return;
    const text=await file.text();
    let parsed;
    try{parsed=JSON.parse(text);}
    catch(e){alert('❌ JSONファイルの読み込みに失敗しました\n\n正しいバックアップファイルを選択してください');return;}
    /* バリデーション */
    if(!parsed||typeof parsed!=='object'||!parsed.data||typeof parsed.data!=='object'){
      alert('❌ バックアップファイルの形式が正しくありません');
      return;
    }
    if(parsed._appName&&parsed._appName!=='factory-app'){
      if(!confirm('⚠️ このアプリのバックアップではない可能性があります。\n本当に読み込みますか？'))return;
    }
    const dataKeys=Object.keys(parsed.data);
    if(dataKeys.length===0){
      alert('❌ データが含まれていません');
      return;
    }
    const exportedAt=parsed._exportedAt?new Date(parsed._exportedAt).toLocaleString('ja-JP'):'不明';
    if(!confirm(`📤 バックアップを読み込みます\n\n作成日時: ${exportedAt}\n項目数: ${dataKeys.length}\n\n⚠️ 現在のデータは上書きされます。続行しますか？`))return;
    /* 既存全削除→書き込み */
    await idbClear();
    for(const k of dataKeys){
      await idbSet(k,parsed.data[k]);
    }
    alert('✅ バックアップを読み込みました\n\nアプリを再起動します');
    location.reload();
  }catch(e){
    console.error('import error:',e);
    alert('❌ 読み込みに失敗しました\n\n'+e.message);
  }
};

function saveOrder(){
  try{
    const qty=parseInt(S.form.qty,10)||0;
    const deadline=getDateVal('f-dl')||S.form.deadline||'';
    const inspectionDate=getDateVal('f-ins')||S.form.inspectionDate||'';
    const internalInspectionDate=getDateVal('f-iins')||S.form.internalInspectionDate||'';
    const heatTreatReturnDate=getDateVal('f-ht')||S.form.heatTreatReturnDate||'';
    const outsourceReturnDate=getDateVal('f-os')||S.form.outsourceReturnDate||'';
    /* 【改修④】置き場在庫：存在するキーのみ保存 */
    const storageQty={};
    document.querySelectorAll('.storage-inp').forEach(el=>{
      const place=el.dataset.place;
      const v=parseInt(el.value)||0;
      if(place&&v>0)storageQty[place]=v;
    });
    /* 【改修③④】工程の正規化:
       - _filterTypes（UI状態）を除去
       - 時間/個を h単位に正規化保存（hoursPerUnitUnit='日'なら × dailyH）
       - machineCount を machineIds.length と整合させる */
    const dailyH=calcDailyH()||8;
    const normalizeStep=s=>{
      const out={...s};
      delete out._filterTypes;
      out.machineCount=Math.max(parseMachineIds(out.machineId).length,parseInt(out.machineCount)||1);
      out.done=Math.min(parseInt(out.done)||0,qty);
      out.rework=Math.max(0,Math.min(parseInt(out.rework)||0,out.done));
      return out;
    };
    const alertDays=Math.max(1,parseInt(S.form.alertDays)||20);
    const e={
      ...S.form,qty,deadline,inspectionDate,internalInspectionDate,
      heatTreatReturnDate,outsourceReturnDate,
      alertDays,
      storageQty,
      group1:(S.form.group1||[]).map(normalizeStep),
      group2:(S.form.group2||[]).map(normalizeStep),
    };
    orders=S.eid?orders.map(o=>o.id===S.eid?e:o):[...orders,e];
    persist();checkAlarm();set({view:'list'});
  }catch(e){alert('保存エラー: '+e.message);}
}

}

  const tabs=[['list','📋','一覧'],['schedule','📅','予定表'],['report','📊','報告'],['calendar','🗓','カレンダー'],['masters','⚙️','設定']];
  return`<nav class="bnav">
    ${tabs.map(([v,ic,lb])=>`<button onclick="set({view:'${v}'})" class="${S.view===v?'active':''}"><span class="ico">${ic}</span>${lb}</button>`).join('')}
    <button onclick="toggleAlarmSetting()" title="アラーム設定"><span class="ico">${alarmIcon}</span></button>
  </nav>`;
}

/* ===== LIST ===== */
function buildList(){
  const doneN=orders.filter(isDone).length;
  const remainN=orders.length-doneN;
  const overN=orders.filter(isOver).length;
  const urgentN=orders.filter(isUrgent).length;
  const cautionN=orders.filter(o=>o.caution&&!isDone(o)).length;
  const inspItems=orders.filter(o=>(o.inspection||o.internalInspection)&&!isDone(o)).sort((a,b)=>(a.inspectionDate||a.internalInspectionDate||'').localeCompare(b.inspectionDate||b.internalInspectionDate||''));
  const getOrderTeams=o=>{
    const all=[...(o.group1||[]),...(o.group2||[])];
    const teams=new Set();
    all.forEach(s=>{const w=workerById(s.operatorId);if(w&&w.team)teams.add(w.team);});
    return teams;
  };
  const visible=orders.filter(o=>{
    if(!S.showDone&&isDone(o))return false;
    if(S.showCautionOnly&&!o.caution)return false;
    const tf=S.teamFilter||'全班';
    if(tf!=='全班'){const teams=getOrderTeams(o);if(!teams.has(tf))return false;}
    if(_searchQ){
      const all=[...(o.group1||[]),...(o.group2||[])];
      return[o.seiban,o.client,o.product,...all.map(s=>machineNamesFromIds(s.machineId)),o.note].some(v=>(v||'').includes(_searchQ));
    }
    return true;
  });
  const minibar=(r,c)=>`<div style="height:5px;background:#0d1117;border-radius:99px;overflow:hidden;min-width:34px"><div style="height:100%;width:${Math.min(r*100,100)}%;background:${c};border-radius:99px"></div></div>`;
  const accentColors=['#6366f1','#06b6d4','#10b981','#f59e0b','#f97316','#ef4444'];
  const grouped=(()=>{
    const map={};
    visible.forEach(o=>{
      const key=S.groupBy==='machine'
        ?([...(o.group1||[]),...(o.group2||[])].map(s=>machineNamesFromIds(s.machineId)).filter(Boolean).join('・')||'機械未設定')
        :(o.deadline?`${o.deadline.slice(0,4)}年${parseInt(o.deadline.slice(5,7))}月`:'納期未設定');
      if(!map[key])map[key]=[];map[key].push(o);
    });
    return Object.keys(map).sort((a,b)=>{if(a==='納期未設定'||a==='機械未設定')return 1;if(b==='納期未設定'||b==='機械未設定')return-1;return a.localeCompare(b);}).map(k=>({key:k,items:map[k].sort((a,b)=>(a.deadline||'9999').localeCompare(b.deadline||'9999'))}));
  })();

  /* 【改修⑥】目標超過のラベルを14日-30日に変更 */
  const nearCount=orders.filter(o=>!isDone(o)&&o.deadline&&diffDays(o.deadline)<30&&diffDays(o.deadline)>=14).length;

  return`
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="spin" style="font-size:20px">⚙️</span>
      <div>
        <div style="font-weight:900;color:#e2e8f0;font-size:14px">工程管理システム</div>
        <div style="color:#6366f1;font-size:9px;letter-spacing:2px">造機工場</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:7px">
      <button id="new-btn" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:7px;color:#fff;padding:7px 14px;font-weight:700;font-size:13px">＋ 新規</button>
      <button id="lock-btn" style="background:none;font-size:18px;padding:4px">🔒</button>
    </div>
  </div>
  <div class="wrap">
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px">
      ${[
        ['📋','残件数',remainN,'#e2e8f0','#161b22','#21262d'],
        ['🚨','超過',overN,'#ef4444',overN>0?'#2d0a0a':'#161b22',overN>0?'#ef444450':'#21262d'],
        ['⚡','7日以内',urgentN,'#f97316',urgentN>0?'#1c0a00':'#161b22',urgentN>0?'#f9731650':'#21262d'],
        ['⚑','注意',nearCount,'#eab308','#161b22','#21262d'],
        ['✅','完了',doneN,'#10b981','#161b22','#21262d']
      ].map(([ic,lb,vl,co,bg,bd])=>`
      <div style="background:${bg};border:1px solid ${bd};border-radius:10px;padding:8px 4px;text-align:center">
        <div style="font-size:15px">${ic}</div><div style="color:${co};font-weight:900;font-size:20px;line-height:1.1">${vl}</div>
        <div style="color:#475569;font-size:10px;margin-top:1px">${lb}</div>
      </div>`).join('')}
    </div>
    ${inspItems.length>0?`<div class="card" style="border-color:#10b98150;background:linear-gradient(135deg,#052e1690,#161b22);margin-bottom:10px">
      <p style="color:#10b981;font-weight:700;font-size:11px;letter-spacing:1px;margin-bottom:7px">🔍 検査スケジュール</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${inspItems.map(o=>`<div onclick="set({view:'detail',eid:${o.id}})" style="background:#0d1117;border:1px solid #10b98140;border-radius:7px;padding:5px 9px;cursor:pointer"><div style="color:#10b981;font-weight:700;font-size:11px">${fmtFull(o.inspectionDate||o.internalInspectionDate)}</div><div style="color:#e2e8f0;font-size:10px">${esc(o.product)||'―'}</div></div>`).join('')}
      </div>
    </div>`:''}
    <div class="team-tab-row">
      ${['全班','1班','2班','3班'].map(t=>`<button onclick="set({teamFilter:'${t}'})" class="${(S.teamFilter||'全班')===t?'active':''}">${t}</button>`).join('')}
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
      <div style="display:flex;background:#161b22;border:1px solid #21262d;border-radius:8px;overflow:hidden">
        ${[['all','📋 全て'],['month','📅 月別'],['machine','🔧 機械別']].map(([k,l])=>`<button class="tab-btn" data-group="${k}" style="background:${S.groupBy===k?'linear-gradient(135deg,#4f46e5,#7c3aed)':'transparent'};border:none;color:${S.groupBy===k?'#fff':'#64748b'};padding:6px 10px;font-weight:700;font-size:11px">${l}</button>`).join('')}
      </div>
      <button id="toggle-done" style="background:${S.showDone?'#052e16':'#161b22'};border:1px solid ${S.showDone?'#10b98150':'#21262d'};border-radius:8px;color:${S.showDone?'#10b981':'#64748b'};padding:6px 9px;font-weight:700;font-size:11px">${S.showDone?'✅完了含む':'完了を隠す'}</button>
      ${cautionN>0?`<button id="toggle-caution" style="background:${S.showCautionOnly?'#450a0a':'#161b22'};border:1px solid ${S.showCautionOnly?'#ef444460':'#21262d'};border-radius:8px;color:${S.showCautionOnly?'#ef4444':'#64748b'};padding:6px 9px;font-weight:700;font-size:11px">⚠️ 注意${S.showCautionOnly?'':('('+cautionN+')')}</button>`:''}
      <div style="position:relative;flex:1;min-width:110px">
        <span style="position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px">🔍</span>
        <input id="search-inp" value="${esc(_searchQ)}" placeholder="検索..." style="padding-left:30px;background:#161b22;border-color:#21262d;font-size:12px">
      </div>
    </div>
    ${grouped.length===0?`<div style="text-align:center;padding:50px 20px"><div style="font-size:50px;margin-bottom:10px">🏭</div><p style="color:#475569;font-size:15px;margin-bottom:16px">工程がまだ登録されていません</p><button id="new-btn2" style="background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:10px;color:#fff;padding:11px 28px;font-weight:700;font-size:14px">＋ 最初の工程を登録</button></div>`:''}
    ${grouped.map(({key,items},gi)=>{
      const gDone=items.filter(isDone).length;
      const gOver=items.filter(isOver).length;
      const ac=accentColors[gi%accentColors.length];
      return`<div style="margin-bottom:20px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:0 2px">
          <div style="width:3px;height:18px;background:${ac};border-radius:2px"></div>
          <span style="color:${ac};font-weight:900;font-size:13px">${esc(key)}</span>
          <div style="height:1px;flex:1;background:#21262d"></div>
          <span style="color:#475569;font-size:11px">残${items.length-gDone}</span>
          ${gOver>0?`<span style="color:#ef4444;font-size:11px;font-weight:700">超過${gOver}</span>`:''}
        </div>
        <div style="background:#161b22;border:1px solid ${ac}33;border-radius:10px;overflow:hidden">
          <div style="display:grid;grid-template-columns:72px 1fr 50px 80px 1fr;padding:5px 10px;background:#0a0f18;border-bottom:1px solid ${ac}22">
            ${['製番','製品名','個数','納期','進捗'].map(h=>`<div style="color:#475569;font-size:10px;font-weight:700;letter-spacing:1px">${h}</div>`).join('')}
          </div>
          ${items.map((o,i)=>{
            const done=isDone(o);const ov=overallRatio(o);
            const ds=dlStatus(o,done);const qty=parseInt(o.qty)||0;
            const feas=feasibility(o);
            return`<div class="order-row" data-id="${o.id}" style="display:grid;grid-template-columns:72px 1fr 50px 80px 1fr;padding:7px 10px;border-bottom:${i<items.length-1?'1px solid #21262d12':'none'};cursor:pointer;background:${done?'#0a110a':o.caution?'#160a0a':'transparent'};opacity:${done?.5:1};align-items:center">
              <div>
                <div style="color:#6366f1;font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(o.seiban)||'―'}</div>
                <div style="display:flex;gap:2px;flex-wrap:wrap;margin-top:2px">
                  ${o.caution?`<span class="pulse" style="background:#450a0a;color:#ef4444;border-radius:3px;padding:0 3px;font-size:9px">⚠️</span>`:''}
                  ${o.internalInspection?`<span style="background:#052e16;color:#22d3ee;border-radius:3px;padding:0 3px;font-size:9px">🏭</span>`:''}
                  ${o.inspection?`<span style="background:#052e16;color:#10b981;border-radius:3px;padding:0 3px;font-size:9px">🔍</span>`:''}
                  ${o.heatTreat?`<span style="background:#1c0a00;color:#f97316;border-radius:3px;padding:0 3px;font-size:9px">🔥</span>`:''}
                  ${o.outsource?`<span style="background:#1e0a3c;color:#8b5cf6;border-radius:3px;padding:0 3px;font-size:9px">🚚</span>`:''}
                </div>
              </div>
              <div style="padding:0 4px;min-width:0">
                <div style="color:#e2e8f0;font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(o.product)||'―'}</div>
                <div style="color:#64748b;font-size:11px">${esc(o.client)||''}</div>
                ${feas.label&&!done?`<div style="font-size:11px;font-weight:700;margin-top:2px" class="${feas.cls}">${feas.label}</div>`:''}
                ${feas.detail&&!done?`<div style="font-size:10px;color:#475569;margin-top:1px">${feas.detail}</div>`:''}
                ${!done?`<div style="margin-top:2px">${finishBadge(o)}</div>`:''}
                ${(()=>{const stot=Object.values(o.storageQty||{}).reduce((a,b)=>a+(parseInt(b)||0),0);return stot>0?`<div style="font-size:10px;color:#f59e0b;margin-top:2px">📦 置き場 ${stot}個</div>`:'';})()}
              </div>
              <div style="text-align:center;color:#94a3b8;font-size:12px;font-weight:700">${qty}<span style="font-size:10px;color:#475569">個</span></div>
              <div>
                <div class="tag ${ds.cls}" style="text-align:center;display:inline-block">${done?'完了':o.deadline?fmt(o.deadline):'未設定'}</div>
              </div>
              <div style="padding-left:4px">
                <div style="display:flex;align-items:center;gap:4px;margin-bottom:2px">
                  <div style="flex:1">${minibar(ov,sc(ov))}</div>
                  <span style="color:${sc(ov)};font-size:9px;font-weight:700">${Math.round(ov*100)}%</span>
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('')}
  </div>`;

/* 【改修④】置き場在庫に×ボタン */
function buildForm(){
  const f=S.form;
  const machineOpts=`<option value="">機械未設定</option>${(masters.machines||[]).map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('')}`;
  const workerOpts=`<option value="">担当未設定</option>${(masters.workers||[]).map(w=>`<option value="${w.id}">${esc(w.name)} (${esc(w.role)}${w.team?' '+esc(w.team):''})</option>`).join('')}`;
  const tog=(key,val,label,color='#6366f1')=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:#0d1117;border-radius:8px;border:1px solid #21262d;margin-bottom:6px">
    <span style="color:#94a3b8;font-size:12px">${label}</span>
    <button class="tog" data-toggle="${key}" data-val="${val}" style="background:${val?`linear-gradient(135deg,${color},${color}bb)`:'#1e293b'};border:1px solid ${val?color:'#334155'};color:${val?'#fff':'#475569'}">${val?'ON':'OFF'}</button>
  </div>`;

  const renderGroupSteps=(gk,color,label)=>{
    const steps=f[gk]||[];
    const allTypes=machineTypes();
    return`<div class="group-box ${gk}-box">
      <div class="group-label" style="color:${color}">
        <div style="width:4px;height:16px;background:${color};border-radius:2px"></div>
        ${label}
      </div>
      ${steps.map((s,i)=>{
        const selWorker=workerOpts.replace(`value="${esc(s.operatorId)}"`,`value="${esc(s.operatorId)}" selected`);
        /* 【改修③】機械種別フィルタ + 複数選択 */
        const selectedMids=parseMachineIds(s.machineId);

        return`<div class="step-c">

          </div>

                <input type="number" class="step-inp hpu-val" data-gk="${gk}" data-idx="${i}"
                  min="0.5" step="0.5" value="${curHpu||''}" placeholder="例: 2.5"
                  inputmode="decimal"
                  style="flex:1;min-width:0">
                <select class="step-inp hpu-unit" data-gk="${gk}" data-idx="${i}" style="width:58px;flex-shrink:0">
                  <option value="h" ${curUnit==='h'?'selected':''}>h</option>

            <div><label class="lbl">実績合計(h)</label><input class="step-inp" data-gk="${gk}" data-idx="${i}" data-field="actualHours" type="number" min="0" step="0.5" value="${s.actualHours||''}" placeholder="12.5"></div>

      }).join('')}
      <button onclick="addStepToGroup('${gk}')" style="background:#1e293b;border:1px solid ${color}44;border-radius:7px;color:${color};padding:8px;font-size:12px;font-weight:700;width:100%;margin-top:4px">＋ ${label}に工程を追加</button>
    </div>`;

  /* 【指摘⑤】置き場在庫: 全STORAGE_PLACESを常に表示、×で0クリア */

      ${f.outsource?`<div style="margin:-2px 0 6px;padding:8px 12px;background:#0d1117;border-radius:7px;border:1px solid #21262d">
        <label class="lbl">外注 戻り日（未選択の場合 +3日で自動計算）</label>
        ${makeDateSelects('f-os',f.outsourceReturnDate,'outsourceReturnDate')}
        <p style="color:#475569;font-size:11px;margin-top:4px">※空欄のまま → 工程１完了日から3日後を自動適用</p>

/* ===== DETAIL (詳細画面) ===== */
function buildDetail(){
  const o=orders.find(x=>x.id===S.eid);if(!o){S.view='list';return buildList();}
  const done=isDone(o);const ds=dlStatus(o,done);
  const qty=parseInt(o.qty)||0;
  const dh=calcDailyH();
  const totalH=calcRemaining(o);
  const feas=feasibility(o);
  const g2Exists=hasGroup2(o);
  const bar=(r,c,h=8)=>`<div style="height:${h}px;background:#0d1117;border-radius:99px;overflow:hidden"><div style="height:100%;width:${Math.min(r*100,100)}%;background:linear-gradient(90deg,${c},${c}bb);border-radius:99px;transition:width .4s"></div></div>`;

  /* 【改修①】加工②が空の場合はフロー図に表示しない */
  /* 【改修⑦】社内検査→立会検査の順に変更 */
  const buildFlowNodes=()=>{
    const nodes=[];
    (o.group1||[]).forEach((s,i)=>{
      const r=qty>0?(parseInt(s.done)||0)/qty:0;
      nodes.push({type:'step',gk:'group1',s,i,r,color:'#6366f1'});
    });
    if(o.heatTreat)nodes.push({type:'option',icon:'🔥',label:'熱処理',color:'#f97316',date:o.heatTreatReturnDate});
    if(o.outsource)nodes.push({type:'option',icon:'🚚',label:'外注',color:'#8b5cf6',date:o.outsourceReturnDate});
    /* 加工②が設定されている場合のみ表示 */
    if(g2Exists){
      (o.group2||[]).forEach((s,i)=>{
        const r=qty>0?(parseInt(s.done)||0)/qty:0;
        nodes.push({type:'step',gk:'group2',s,i,r,color:'#06b6d4'});
      });
    }
    /* 社内検査→立会検査の順 */
    if(o.internalInspection)nodes.push({type:'option',icon:'🏭',label:'社内検査',color:'#22d3ee',date:o.internalInspectionDate});
    if(o.inspection)nodes.push({type:'option',icon:'🔍',label:'立会検査',color:'#10b981',date:o.inspectionDate});
    return nodes;
  };

  const flowNodes=buildFlowNodes();
  const flowHTML=flowNodes.map((n,idx)=>{
    const arrow=idx<flowNodes.length-1?`<div class="flow-arrow">→</div>`:'';
    if(n.type==='option'){
      return`<div class="flow-node option-node" style="border-color:${n.color}44">
        <div style="font-size:18px">${n.icon}</div>
        <div style="font-size:10px;font-weight:700;color:${n.color};margin-top:3px">${n.label}</div>
        ${n.date?`<div style="font-size:9px;color:#475569;margin-top:2px">${fmt(n.date)}</div>`:''}
      </div>${arrow}`;
    }
    const {s,gk,r,color}=n;
    const mn=machineNamesFromIds(s.machineId);const wn=workerName(s.operatorId);
    const doneS=(parseInt(s.done)||0)>=qty&&qty>0;
    return`<div class="flow-node ${gk==='group1'?'g1':'g2'}" style="opacity:${doneS?.7:1}">
      <div style="font-size:10px;font-weight:700;color:${color};margin-bottom:4px">${esc(s.name)}</div>
      ${mn?`<div style="font-size:9px;color:#475569">🔧${esc(mn)}</div>`:''}
      ${wn?`<div style="font-size:9px;color:#475569">👤${esc(wn)}</div>`:''}
      <div class="flow-prog-bar"><div class="flow-prog-inner" style="width:${Math.min(r*100,100)}%;background:${sc(r)}"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <span style="font-size:9px;color:#475569">${parseInt(s.done)||0}/${qty}個</span>
        <span style="font-size:10px;font-weight:700;color:${sc(r)}">${doneS?'✅':Math.round(r*100)+'%'}</span>
      </div>
    </div>${arrow}`;
  }).join('');

  const buildStepCard=(s,gk,i)=>{
    const rw=parseInt(s.rework)||0;
    const nd=netDone(s);
    const r=qty>0?nd/qty:0;const doneS=nd>=qty&&qty>0;
    const rem=Math.max(0,qty-nd);const h=hpuToHours(s);const mc=Math.max(1,parseInt(s.machineCount)||1);
    const mn=machineNamesFromIds(s.machineId);const wn=workerName(s.operatorId);
    return`<div class="card" style="border-color:${gk==='group1'?'#6366f1':'#06b6d4'}30;${doneS?'opacity:.6':''}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="background:${gk==='group1'?'#6366f1':'#06b6d4'};color:#fff;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:900">${esc(s.name)}</span>
          ${mn?`<span style="color:#475569;font-size:11px">🔧${esc(mn)}</span>`:''}
          ${wn?`<span style="color:#475569;font-size:11px">👤${esc(wn)}</span>`:''}
        </div>
        <span style="color:${sc(r)};font-weight:700;font-size:12px">${doneS?'✅完了':r>0?'⚙️作業中':'⏳未着手'}</span>
      </div>
      ${bar(r,sc(r),10)}
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap">
        <span style="color:#64748b;font-size:12px;flex-shrink:0">完了個数</span>
        <input type="number" min="0" max="${qty}" value="${parseInt(s.done)||0}" class="step-prog" data-oid="${o.id}" data-gk="${gk}" data-sid="${s.id}" inputmode="numeric" style="background:#0d1117;border:1px solid ${sc(r)}60;border-radius:7px;padding:7px 8px;font-size:16px;font-weight:900;width:80px;text-align:center;outline:none;flex-shrink:0">
        <span style="color:#334155;font-size:16px;flex-shrink:0">/</span>
        <span style="color:#64748b;font-size:14px;flex-shrink:0">${qty}個</span>
        <span style="margin-left:auto;color:${sc(r)};font-weight:900;font-size:18px;flex-shrink:0">${Math.round(r*100)}%</span>
      </div>
      <!-- 手直しカウンター -->
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;padding:7px 10px;background:${rw>0?'#1c0a00':'#0d1117'};border:1px solid ${rw>0?'#f9731650':'#21262d'};border-radius:8px">
        <span style="color:#f97316;font-size:11px;font-weight:700;flex-shrink:0">🔧 手直し</span>
        <input type="number" min="0" max="${parseInt(s.done)||0}" value="${rw||''}" placeholder="0" class="step-rework" data-oid="${o.id}" data-gk="${gk}" data-sid="${s.id}" inputmode="numeric" style="background:transparent;border:none;border-bottom:1px solid ${rw>0?'#f97316':'#334155'};border-radius:0;padding:2px 4px;font-size:14px;font-weight:700;width:60px;text-align:center;outline:none;color:${rw>0?'#fb923c':'#64748b'}">
        <span style="color:#64748b;font-size:11px">個</span>
        ${rw>0?`<span style="color:#f97316;font-size:11px;font-weight:700">→ 実質完了: ${nd}個 (${Math.round(r*100)}%)</span>`:'<span style="color:#334155;font-size:10px">入力すると実質完了数から除外</span>'}
      </div>
      ${h>0&&rem>0?`<div style="margin-top:6px;font-size:11px;color:#475569">残${rem}個 × ${hhmm(h)}${mc>1?` ÷ ${mc}台`:''} = <span style="color:#94a3b8;font-weight:700">${hhmm(h*rem/mc)}</span></div>`:''}
    </div>`;
  };

  /* 【指摘②】加工②が空でも常に最長・最短を両方表示
     G2空の場合: 最短=最長になる */
  const buildRemainCard=()=>{
    if(isDone(o))return'';
    const risk=calcRisk(o);
    if(risk.level==='none')return'';
    const optD=(risk.opt/dh).toFixed(1);
    const pesD=(risk.pes/dh).toFixed(1);
    const riskCls={'ok':'risk-ok','warn':'risk-warn','ng':'risk-ng','over':'risk-ng'}[risk.level]||'risk-ok';
    /* 【指摘B】目標日（検査優先） */
    const tgt=risk.targetDate?{date:risk.targetDate,label:risk.targetLabel,isInspection:risk.isInspection}:null;
    /* 【指摘D】終了予定日を稼働日ベースで計算 */
    const finishDate=calcFinishDate(risk.pes,dh);
    const finishDateOpt=calcFinishDate(risk.opt,dh);
    /* 終了予定日と目標日の関係 */
    let finishStatusCls='color:#10b981',finishStatusMsg='';
    if(tgt&&finishDate){
      if(finishDate>tgt.date){finishStatusCls='color:#ef4444';finishStatusMsg=`⚠️ ${tgt.label}(${fmtMD(tgt.date)})より${diffDays(finishDate)-diffDays(tgt.date)}日遅延見込`;}
      else{finishStatusMsg=`✅ ${tgt.label}(${fmtMD(tgt.date)})に間に合う`;}
    }

    const stot=Object.values(o.storageQty||{}).reduce((a,b)=>a+(parseInt(b)||0),0);
    /* 【指摘⑤】置き場在庫×ボタン */
    const storageTxt=stot>0?`<div style="margin-top:8px;padding:10px 12px;background:#1c1400;border:1px solid #f59e0b30;border-radius:8px;font-size:13px;color:#f59e0b">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span>📦 置き場在庫: 合計 <strong style="font-size:16px">${stot}個</strong></span>
      </div>
      <div style="font-size:11px;color:#94a3b8;margin-top:6px">
        ${STORAGE_PLACES.filter(p=>(parseInt(o.storageQty&&o.storageQty[p])||0)>0).map(p=>`
          <span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px;margin-bottom:4px">
            <span>${esc(p)}: ${parseInt(o.storageQty[p])}個</span>
            <button type="button" class="storage-del-detail" data-oid="${o.id}" data-place="${esc(p)}" style="background:#2d0a0a;border:1px solid #ef444460;color:#f87171;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;cursor:pointer">✕</button>
          </span>
        `).join('')}
      </div>
    </div>`:'';

    /* 【指摘D】終了予定日カード（最重要表示） */

/* ===== DAILY (日報画面) ===== */
/* 【指摘①】残業時間を担当者別に入力 */
function buildDaily(){
  const date=S.dailyDate;
  const daily=getDailyNotes(date);
  const baseH=calcDailyH();
  const otMap=daily.overtimeByWorker||{};
  /* 合計残業時間を計算 */
  const totalOt=Object.values(otMap).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const workerCount=Object.keys(otMap).filter(k=>(parseFloat(otMap[k])||0)>0).length;
  const dw=['日','月','火','水','木','金','土'][new Date(date+'T00:00:00').getDay()];
  const teamFilter=S.dailyTeam;
  const activeOrders=orders.filter(o=>!isDone(o));
  const workerGroups=[];
  if(teamFilter==='全班'||teamFilter==='職長'){
    const shokucho=masters.workers.filter(w=>w.role==='職長');
    if(shokucho.length)workerGroups.push({label:'🏭 職長',color:'#f59e0b',workers:shokucho});
  }
  TEAMS.forEach(team=>{
    if(teamFilter!=='全班'&&teamFilter!==team)return;
    const tc=TEAM_COLORS[team];
    const hancho=masters.workers.filter(w=>w.team===team&&w.role==='班長');
    const workers=masters.workers.filter(w=>w.team===team&&w.role!=='班長'&&w.role!=='職長');
    const all=[...hancho,...workers];
    if(all.length>0||teamFilter===team)workerGroups.push({label:team,color:tc,workers:all,isTeam:true});
  });
  const getWorkerTasks=wid=>{
    const tasks=[];
    activeOrders.forEach(o=>{
      const allSteps=[...(o.group1||[]).map(s=>({...s,gk:'group1'})),...(o.group2||[]).map(s=>({...s,gk:'group2'}))];
      allSteps.forEach(s=>{
        if(s.operatorId!=wid)return;
        const q=parseInt(o.qty)||0;const d=parseInt(s.done)||0;
        if(d>=q&&q>0)return;
        tasks.push({order:o,step:s,ratio:q>0?d/q:0});
      });
    });
    return tasks;
  };
  const memos=daily.meetings||[];
  const asa=memos.filter(m=>m.session==='朝');
  const hiru=memos.filter(m=>m.session==='昼');
  const memoSection=(session,items)=>`
    <div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="color:${session==='朝'?'#fbbf24':'#06b6d4'};font-weight:700;font-size:12px">${session==='朝'?'🌅 朝の会':'🌆 昼の会'}</span>
        <button onclick="addMeeting('${session}')" style="background:#1e293b;border:1px solid #334155;border-radius:6px;color:#94a3b8;padding:4px 10px;font-size:11px;font-weight:700">＋ 追加</button>
      </div>
      ${items.length===0?`<p style="color:#334155;font-size:11px;text-align:center;padding:8px">連絡事項なし</p>`:''}
      ${items.map(m=>`
        <div style="display:flex;align-items:flex-start;gap:10px;padding:8px 10px;background:${m.checked?'#0a110a':'#0d1117'};border-radius:8px;border:1px solid ${m.checked?'#10b98130':'#21262d'};margin-bottom:6px;opacity:${m.checked?.6:1}">
          <input type="checkbox" id="chk-${m.id}" ${m.checked?'checked':''} onchange="toggleMeeting(${m.id})" style="margin-top:2px;flex-shrink:0">
          <textarea id="memo-${m.id}" placeholder="連絡内容を入力..." style="flex:1;background:transparent;border:none;resize:none;height:48px;font-size:12px;color:${m.checked?'#475569':'#e2e8f0'};text-decoration:${m.checked?'line-through':'none'}">${esc(m.text)}</textarea>
          <button onclick="delMeeting(${m.id})" style="background:none;border:none;color:#334155;font-size:14px;padding:2px;flex-shrink:0">✕</button>
        </div>`).join('')}
    </div>`;
  return`<div class="up">
  <div class="hdr">
    <div><div style="font-weight:900;color:#e2e8f0;font-size:14px">📊 日報</div><div style="color:#6366f1;font-size:9px;letter-spacing:2px">DAILY PROGRESS</div></div>
    <div style="display:flex;align-items:center;gap:8px">
      <input type="date" id="daily-date" value="${date}" style="background:#0d1117;border-color:#334155;font-size:12px;padding:5px 8px;width:auto">
      <button id="lock-btn" style="background:none;font-size:18px;padding:4px">🔒</button>
    </div>
  </div>
  <div class="wrap">
    <div style="text-align:center;margin-bottom:12px;padding:10px;background:#161b22;border-radius:10px;border:1px solid #21262d">
      <span style="color:#e2e8f0;font-size:16px;font-weight:900">${fmtFull(date)} (${dw})</span>
      ${date===todayStr()?`<span style="background:#6366f1;color:#fff;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:8px">TODAY</span>`:''}
    </div>

    <!-- 【指摘①】本日の稼働時間（基本勤務時間＋各担当者の残業合計を表示） -->
    <div class="card" style="border-color:#f59e0b30;background:linear-gradient(135deg,#161b22,#1a1400);margin-bottom:12px">
      <p style="color:#f59e0b;font-weight:700;font-size:12px;letter-spacing:1px;margin-bottom:10px">🕐 本日の稼働時間（全体）</p>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div style="background:#0d1117;border-radius:8px;padding:10px;text-align:center">
          <div style="color:#64748b;font-size:10px;letter-spacing:1px">基本勤務</div>
          <div style="color:#e2e8f0;font-weight:900;font-size:18px;line-height:1.2">${baseH.toFixed(1)}<span style="font-size:11px;color:#475569">h</span></div>
        </div>
        <div style="background:#0d1117;border-radius:8px;padding:10px;text-align:center">
          <div style="color:#64748b;font-size:10px;letter-spacing:1px">残業合計</div>
          <div style="color:#f59e0b;font-weight:900;font-size:18px;line-height:1.2">${totalOt.toFixed(1)}<span style="font-size:11px;color:#475569">h</span></div>
          <div style="color:#64748b;font-size:10px;margin-top:2px">${workerCount}名</div>
        </div>
        <div style="background:#0a0f18;border:1px solid #10b98140;border-radius:8px;padding:10px;text-align:center">
          <div style="color:#10b981;font-size:10px;letter-spacing:1px;font-weight:700">のべ稼働</div>
          <div style="color:#10b981;font-weight:900;font-size:18px;line-height:1.2">${totalOt.toFixed(1)}<span style="font-size:11px">h</span></div>
          <div style="color:#64748b;font-size:10px;margin-top:2px">(残業分)</div>
        </div>
      </div>
      <p style="color:#64748b;font-size:10px;margin-top:8px">※ 残業時間は各担当者のカードに入力してください（納期計算には影響しません）</p>
    </div>

    <div style="display:flex;background:#161b22;border:1px solid #21262d;border-radius:9px;overflow:hidden;margin-bottom:12px;position:sticky;top:46px;z-index:50;box-shadow:0 4px 8px #000a">
      ${['全班','1班','2班','3班'].map(t=>`<button onclick="set({dailyTeam:'${t}'})" style="flex:1;background:${S.dailyTeam===t?'linear-gradient(135deg,#4f46e5,#7c3aed)':'#161b22'};border:none;color:${S.dailyTeam===t?'#fff':'#64748b'};padding:8px 4px;font-weight:700;font-size:12px">${t}</button>`).join('')}
    </div>
    ${workerGroups.length===0?`<div style="text-align:center;padding:30px;color:#475569"><p>作業員が登録されていません</p></div>`:''}
    ${workerGroups.map(g=>`
      <div style="margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <div style="width:4px;height:20px;background:${g.color};border-radius:2px"></div>

          <div style="height:1px;flex:1;background:#21262d"></div>
          <span style="color:#475569;font-size:11px">${g.workers.length}名</span>
        </div>
        ${g.workers.map(w=>{
          const tasks=getWorkerTasks(w.id);
          const mn=machineName(w.mainMachineId);
          const workerOt=parseFloat(otMap[w.id])||0;
          return`<div style="background:#161b22;border:1px solid #21262d;border-radius:10px;padding:12px;margin-bottom:8px;border-left:4px solid ${g.color}">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
              <span style="font-weight:800;color:#e2e8f0;font-size:13px">${esc(w.name)}</span>

/* ===== 機械別負荷グラフ ===== */
function buildLoadGraph(){
  const teams=['全班',...TEAMS];
  /* 表示対象月をS.schStartから取得 */
  const baseDate=S.schStart||todayStr();
  const ym=baseDate.slice(0,7); /* "YYYY-MM" */
  const [y,m]=ym.split('-').map(Number);
  /* 月の稼働日数を計算 */
  const daysInMonth=new Date(y,m,0).getDate();
  const holidaySet=getHolidaySet();
  let monthWorkdays=0;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${ym}-${String(d).padStart(2,'0')}`;
    if(!isHoliday(ds))monthWorkdays++;
  }
  const dh=calcDailyH()||8;
  const monthAvailH=monthWorkdays*dh; /* 1機械あたりの月間利用可能時間 */
  /* 全バーの中からこの月に重なるものを集計 */
  const allBars=getScheduleBars();
  const filteredBars=S.schTeam==='全班'?allBars:filterBarsByTeam(allBars,S.schTeam);
  /* 機械ごとに月間稼働時間を集計 */
  const machineLoad={}; /* { machineId: hours } */
  filteredBars.forEach(b=>{
    const mid=String(b.machineId);
    if(!machineLoad[mid])machineLoad[mid]=0;
    /* このバーが当月と重なる稼働日数を計算 */
    let overlap=0;
    const s=new Date(b.start);
    const e=new Date(b.endDate||b.start);
    for(let cur=new Date(s);cur<=e;cur.setDate(cur.getDate()+1)){
      const ds=cur.toISOString().slice(0,10);
      if(ds.slice(0,7)===ym&&!isHoliday(ds))overlap++;
    }
    machineLoad[mid]+=overlap*dh;
  });
  /* 表示する機械一覧（班フィルタ） */
  const machines=(masters.machines||[])
    .filter(m=>S.schTeam==='全班'||!m.team||m.team===S.schTeam)
    .sort((a,b)=>{
      const ta=a.team||'zzz',tb=b.team||'zzz';
      if(ta!==tb)return ta.localeCompare(tb);
      return(a.name||'').localeCompare(b.name||'');
    });
  const prevMonth=()=>{let nm=m-1,ny=y;if(nm<1){nm=12;ny--;}set({schStart:`${ny}-${String(nm).padStart(2,'0')}-01`});};
  const nextMonth=()=>{let nm=m+1,ny=y;if(nm>12){nm=1;ny++;}set({schStart:`${ny}-${String(nm).padStart(2,'0')}-01`});};
  window._loadPrevMonth=prevMonth;window._loadNextMonth=nextMonth;
  return`<div class="up">
  <div class="hdr">
    <div><div style="font-weight:900;color:#e2e8f0;font-size:14px">📊 機械別負荷グラフ</div><div style="color:#6366f1;font-size:9px;letter-spacing:2px">MACHINE LOAD</div></div>
    <button onclick="set({schViewMode:'machine'})" style="background:#1e293b;border:1px solid #334155;border-radius:7px;color:#94a3b8;padding:5px 10px;font-size:11px;font-weight:700">← 予定表へ</button>
  </div>
  <div class="wrap">
    <!-- 月切替 -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;background:#161b22;border:1px solid #21262d;border-radius:9px;padding:8px 12px">
      <button onclick="_loadPrevMonth()" style="background:#0d1117;border:1px solid #21262d;border-radius:6px;color:#94a3b8;padding:5px 12px;font-size:13px">◀</button>
      <span style="flex:1;text-align:center;color:#e2e8f0;font-weight:900;font-size:15px">${y}年${m}月</span>
      <button onclick="_loadNextMonth()" style="background:#0d1117;border:1px solid #21262d;border-radius:6px;color:#94a3b8;padding:5px 12px;font-size:13px">▶</button>
    </div>
    <!-- 班フィルタ -->
    <div style="display:flex;background:#161b22;border:1px solid #21262d;border-radius:9px;overflow:hidden;margin-bottom:12px">
      ${teams.map(t=>`<button onclick="set({schTeam:'${t}'})" style="flex:1;background:${S.schTeam===t?'linear-gradient(135deg,#4f46e5,#7c3aed)':'#161b22'};border:none;color:${S.schTeam===t?'#fff':'#64748b'};padding:8px 4px;font-weight:700;font-size:12px">${t}</button>`).join('')}
    </div>
    <!-- サマリ -->
    <div style="background:#161b22;border:1px solid #21262d;border-radius:9px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#64748b">
      稼働日 <strong style="color:#e2e8f0">${monthWorkdays}日</strong> / 1日 <strong style="color:#e2e8f0">${dh}h</strong> / 1機械の月間利用可能: <strong style="color:#22d3ee">${monthAvailH}h</strong>
    </div>
    ${machines.length===0?`<div style="text-align:center;padding:40px;color:#475569">機械が登録されていません</div>`:''}
    <!-- グラフ -->
    <div class="card" style="padding:14px">
      ${machines.map(m=>{
        const mid=String(m.id);
        const usedH=Math.round((machineLoad[mid]||0)*10)/10;
        const pct=monthAvailH>0?Math.min(usedH/monthAvailH*100,150):0; /* 150%でキャップ */
        const barPct=Math.min(pct,100);
        const overPct=pct>100?Math.min(pct-100,50):0;
        const barColor=pct>=100?'#ef4444':pct>=80?'#f59e0b':'#10b981';
        const label=pct>=100?'🔴 過負荷':pct>=80?'🟡 高負荷':'🟢 適正';
        const tc=TEAM_COLORS[m.team||'']||'#334155';
        return`<div style="margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap">
            <div style="min-width:90px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
              <span style="color:#e2e8f0;font-size:12px;font-weight:700">${esc(m.name)}</span>
              ${m.team?`<span style="background:${tc};color:#fff;font-size:8px;font-weight:700;padding:0 4px;border-radius:99px;margin-left:4px">${esc(m.team)}</span>`:''}
            </div>

            <span style="font-size:11px;font-weight:700;color:${barColor};margin-left:auto">${label} ${Math.round(pct)}%</span>
          </div>

            <div style="height:100%;width:${barPct}%;background:linear-gradient(90deg,${barColor}cc,${barColor});border-radius:99px;transition:width .4s;position:absolute;left:0"></div>
            ${overPct>0?`<div style="height:100%;width:${overPct}%;background:repeating-linear-gradient(45deg,#ef444460,#ef444460 4px,transparent 4px,transparent 8px);position:absolute;left:${barPct}%"></div>`:''}
            <div style="position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;color:#ffffff80;font-weight:700">${Math.round(pct)}%</div>

      }).join('')}
      ${machines.length>0?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid #21262d;display:flex;gap:12px;font-size:10px;color:#475569">
        <span>🟢 < 80%: 適正</span><span>🟡 80〜100%: 高負荷</span><span>🔴 > 100%: 過負荷</span>
      </div>`:''}
    </div>
  </div></div>`;

/* ===== CALENDAR ===== */
/* ===== ガントチャート (予定表) ===== */
/* 【改修⑥】機械軸ガントチャート、ドラッグ&ドロップ、担当者表示 */

/* 工程の所要日数を計算（バー長さ = ceil(qty * hpu(h) / (machineCount * dailyH)) ） */
function calcStepDays(s,qty){
  const dh=calcDailyH()||8;
  if(dh<=0)return 1;
  const hpu=hpuToHours(s);
  if(hpu<=0||qty<=0)return 1;
  const mids=parseMachineIds(s.machineId);
  const mc=Math.max(parseInt(s.machineCount)||1,mids.length||1,1);
  const workdays=Math.ceil((qty*hpu)/(mc*dh));
  return Math.max(workdays,1);
}

/* 休日セット（calEventsから生成）*/
function getHolidaySet(){
  return new Set((calEvents||[]).filter(e=>e.type==='holiday'&&e.date).map(e=>e.date));
}

/* 開始日(startDate)から稼働日数(workdays)分進んだ日付を返す
   カレンダーで登録した休日はスキップする */
function addWorkdays(startDate,workdays,holidaySet){
  try{
    if(!holidaySet)holidaySet=getHolidaySet();
    let cur=new Date(startDate);
    let remain=Math.max(workdays,1);
    /* 開始日が休日なら次の稼働日へ進める */
    while(holidaySet.has(cur.toISOString().slice(0,10))){
      cur.setDate(cur.getDate()+1);
    }
    remain--; /* 開始日を1日目とカウント */
    while(remain>0){
      cur.setDate(cur.getDate()+1);
      const ds=cur.toISOString().slice(0,10);
      if(!holidaySet.has(ds))remain--;
    }
    return cur.toISOString().slice(0,10);
  }catch(e){return addDays(startDate,workdays);}
}

/* 開始日〜終了日のカレンダー上の幅（日数）を返す */
function calSpan(startDate,endDate){
  return Math.max(dayDiff(startDate,endDate)+1,1);
}

/* 日付差(日数)を返す。負の値もありうる */
function dayDiff(from,to){
  try{
    const a=new Date(from);const b=new Date(to);
    if(isNaN(a)||isNaN(b))return 0;
    return Math.round((b-a)/(1000*60*60*24));
  }catch(e){return 0;}
}

/* 全予定バーをフラット化して取得
   1工程あたり、選択された機械分のバーを生成 */
function getScheduleBars(){
  const bars=[];
  const today=todayStr();
  const holidaySet=getHolidaySet(); /* 毎回生成せず1回だけ作る */
  orders.forEach(o=>{
    if(!S.schShowDone&&isDone(o))return;
    const qty=parseInt(o.qty)||0;
    ['group1','group2'].forEach(gk=>{
      (o[gk]||[]).forEach(s=>{
        const mids=parseMachineIds(s.machineId);
        if(mids.length===0)return; /* 機械未設定はバー表示しない */
        if(s.scheduleHidden)return; /* 予定を非表示に設定されている場合はスキップ */
        const start=s.scheduleStart||today;
        /* 稼働日数を計算し、休日を飛ばした完了予定日を求める */
        const workdays=calcStepDays(s,qty);
        const endDate=addWorkdays(start,workdays,holidaySet);
        /* バーの表示幅はカレンダー上のスパン（休日も含む実カレンダー日数） */
        const days=calSpan(start,endDate);
        /* scheduleOperatorが未設定の場合、operatorId（受注編集で登録した担当者）で代替 */
        const effectiveOperator=s.scheduleOperator||s.operatorId||'';
        mids.forEach(mid=>{
          bars.push({
            orderId:o.id, gk, stepId:s.id,
            machineId:String(mid),
            start, days, endDate, workdays,
            order:o, step:s,
            scheduleOperator:effectiveOperator,
            scheduleOrder:s.scheduleOrder,
          });
        });
      });
    });
  });
  return bars;
}

/* バーを班でフィルタ。担当者(scheduleOperator)から班を判定。未定は全班に表示 */
/* 班フィルタ：機械の所属班を優先。未設定機械は全班に表示 */
function filterBarsByTeam(bars,team){
  if(team==='全班')return bars;
  return bars.filter(b=>{
    const machine=(masters.machines||[]).find(m=>String(m.id)===String(b.machineId));
    if(machine&&machine.team)return machine.team===team; /* 機械に班設定あり → 機械の班で判定 */
    if(!b.scheduleOperator)return true; /* 機械も担当者も未設定 → 全班に表示 */
    const w=workerById(b.scheduleOperator);
    return w&&w.team===team; /* 機械の班未設定 → 担当者の班で判定 */
  });
}

function buildSchedule(){

      return tasks;
    };
    /* 班フィルタ */
    const allWorkers=masters.workers||[];

      if(ta!==tb)return ta.localeCompare(tb);
      return (a.name||'').localeCompare(b.name||'');
    });
    /* 朝の会・昼の会メモ */
    const asa=(dn.meetings||[]).filter(m=>m.session==='朝');
    const hiru=(dn.meetings||[]).filter(m=>m.session==='昼');
    const memoSection=(label,items)=>`

            <input type="checkbox" id="chk-${m.id}" ${m.checked?'checked':''} onchange="toggleMeeting(${m.id})" style="margin-top:2px;flex-shrink:0">
            <textarea id="memo-${m.id}" placeholder="連絡内容を入力..." style="flex:1;background:transparent;border:none;resize:none;height:44px;font-size:12px;color:${m.checked?'#475569':'#e2e8f0'};text-decoration:${m.checked?'line-through':'none'};outline:none">${esc(m.text)}</textarea>

      <button onclick="set({schViewMode:'machine'})" style="background:#1e293b;border:1px solid #334155;border-radius:7px;color:#94a3b8;padding:5px 10px;font-size:11px;font-weight:700">機械軸に切替</button>
    </div>
    <div class="wrap">

      ${visWorkers.map(w=>{

  /* ===== 負荷グラフビュー ===== */
  if(S.schViewMode==='load'){

    const allMachinesL=masters.machines||[];
    /* 表示月（schStartの月） */
    const baseDate=new Date(start+'T00:00:00');
    const yr=baseDate.getFullYear();const mo=baseDate.getMonth();
    const monthLabel=`${yr}年${mo+1}月`;
    /* 月の稼働日数を計算（土日＋calEvents休日を除外） */
    const daysInMonth=new Date(yr,mo+1,0).getDate();
    let workDaysInMonth=0;
    const holidaySetL=getHolidaySet();
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dow=new Date(ds+'T00:00:00').getDay();
      if(dow!==0&&!holidaySetL.has(ds))workDaysInMonth++;
    }
    const availH=workDaysInMonth*dh;
    /* 各機械の月内予定稼働時間を集計 */
    const machineLoad={};
    allMachinesL.forEach(m=>{machineLoad[String(m.id)]=0;});
    const allBarsL=getScheduleBars();
    allBarsL.forEach(b=>{
      /* バーが表示月と重なるか判定 */
      const bStart=new Date(b.start+'T00:00:00');
      const bEnd=new Date(b.endDate+'T00:00:00');
      const mStart=new Date(yr,mo,1);
      const mEnd=new Date(yr,mo+1,0);
      if(bEnd<mStart||bStart>mEnd)return;
      /* 重なり日数×dh = 簡易稼働時間（厳密でなくて良い） */
      const overlapStart=bStart<mStart?mStart:bStart;
      const overlapEnd=bEnd>mEnd?mEnd:bEnd;
      let overlapWork=0;
      let cur=new Date(overlapStart);
      while(cur<=overlapEnd){
        const ds=cur.toISOString().slice(0,10);
        const dow=cur.getDay();
        if(dow!==0&&!holidaySetL.has(ds))overlapWork++;
        cur.setDate(cur.getDate()+1);

      const totalH=overlapWork*dh;
      /* 機械数で按分（同時稼働） */
      const mids=parseMachineIds(b.step.machineId);
      const mc=Math.max(mids.length,1);

          <span style="color:#475569;font-size:11px">稼働可能: ${availH.toFixed(0)}h（${workDaysInMonth}日×${dh}h）</span>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
          <span style="background:#052e16;color:#10b981;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700">🟢 80%未満</span>
          <span style="background:#422006;color:#f59e0b;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700">🟡 80〜100%</span>
          <span style="background:#450a0a;color:#ef4444;border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700">🔴 100%超（過負荷）</span>
        </div>
        ${visM.length===0?`<p style="color:#475569;text-align:center;padding:20px">機械が登録されていません</p>`:''}
        ${visM.map(m=>{
          const h=machineLoad[String(m.id)]||0;
          const pct=availH>0?h/availH:0;
          const pctDisp=Math.round(pct*100);
          const barColor=pct>=1?'#ef4444':pct>=0.8?'#f59e0b':'#10b981';
          const bgColor=pct>=1?'#450a0a':pct>=0.8?'#422006':'#052e16';
          const tc=TEAM_COLORS[m.team||'']||'#334155';
          return`<div style="margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
              <div style="min-width:90px;max-width:110px">
                <div style="color:#e2e8f0;font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.name)}</div>
                ${m.team?`<span style="background:${tc};color:#fff;font-size:9px;font-weight:700;padding:0 5px;border-radius:99px">${esc(m.team)}</span>`:''}
              </div>
              <div style="flex:1;min-width:120px">
                <div style="height:18px;background:#0d1117;border-radius:99px;overflow:hidden;position:relative">
                  <div style="height:100%;width:${Math.min(pct*100,100)}%;background:${barColor};border-radius:99px;transition:width .4s"></div>
                  ${pct>1?`<div style="position:absolute;top:0;left:0;height:100%;width:100%;background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.3) 4px,rgba(0,0,0,.3) 8px);border-radius:99px"></div>`:''}

                <span style="background:${bgColor};color:${barColor};border-radius:5px;padding:2px 8px;font-size:11px;font-weight:900">${pctDisp}%</span>

  const allMachines=masters.machines||[];
  if(allMachines.length===0){
    return`<div class="up">
      <div class="hdr">

      <div class="wrap">
        <div class="card" style="text-align:center;padding:30px">

    </div>`;

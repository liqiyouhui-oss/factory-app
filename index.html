  const allBars=getScheduleBars();
  const teamBars=filterBarsByTeam(allBars,S.schTeam);
  /* 製品フィルタ：非表示リストに含まれるorderIdのバーを除外 */
  const bars=teamBars.filter(b=>!(S.schProductFilter||[]).includes(b.orderId));

  /* セル幅 */
  const cellW=42;
  const rowH=46;
  const machineColW=110;

  /* 各機械行のバーを集計 */
  const barsByMachine={};
  bars.forEach(b=>{
    if(!barsByMachine[b.machineId])barsByMachine[b.machineId]=[];
    barsByMachine[b.machineId].push(b);
  });

  /* 表示する機械を班でフィルタ（機械の所属班で絞込。未設定は全班に表示） */
  const machinesSorted=[...allMachines]
    .filter(m=>S.schTeam==='全班'||!m.team||m.team===S.schTeam)
    .sort((a,b)=>{
      /* 班順 → 種別順 → 名前順 */
      const ta=a.team||'zzz',tb=b.team||'zzz';
      if(ta!==tb)return ta.localeCompare(tb);
      const ka=a.type||'zzz',kb=b.type||'zzz';
      if(ka!==kb)return ka.localeCompare(kb);
      return (a.name||'').localeCompare(b.name||'');
    });

  /* 休日セットを事前に作成（毎セルでfilterしないよう最適化） */
  const holidaySet=new Set(calEvents.filter(e=>e.type==='holiday'&&e.date).map(e=>e.date));

  /* ヘッダー行（日付） */
  const dayHeaderHTML=dayHeaders.map(d=>{
    const dt=new Date(d);
    const dow=['日','月','火','水','木','金','土'][dt.getDay()];
    const isWeekend=dt.getDay()===0||dt.getDay()===6;
    const isHoliday=holidaySet.has(d);
    const isToday=d===today;
    const isOff=isWeekend||isHoliday; /* 休み判定（土日 or カレンダー休日） */
    return`<div style="width:${cellW}px;flex-shrink:0;text-align:center;padding:4px 0;border-right:1px solid #21262d;background:${isToday?'#1e1b4b':isHoliday?'#450a0a':isOff?'#161b22':'#0d1117'};color:${isToday?'#a78bfa':isHoliday?'#ef4444':isOff?'#64748b':'#94a3b8'}">
      <div style="font-size:9px;color:${isHoliday?'#ef444480':isOff?'#334155':'#475569'}">${dt.getMonth()+1}/${dt.getDate()}</div>
      <div style="font-size:10px;font-weight:700">${dow}</div>
    </div>`;
  }).join('');

  /* 機械行 */
  /* 期間移動ボタン */
  const navPrev=addDays(start,-Math.floor(days/2));
  const navNext=addDays(start,Math.floor(days/2));
  const startDate=new Date(start);
  const periodLabel=`${startDate.getFullYear()}/${String(startDate.getMonth()+1).padStart(2,'0')}/${String(startDate.getDate()).padStart(2,'0')} 〜 ${addDays(start,days-1)}`;

  /* バー編集モーダル */
  let modal='';
  if(S.schBarModal&&S.schBarRef){
    const r=S.schBarRef;
    const o=orders.find(x=>x.id==r.orderId);
    const s=o?(o[r.gk]||[]).find(x=>x.id==r.stepId):null;
    if(s){
      const isHidden=s.scheduleHidden||false;
      const opOpts=`<option value="">未定</option>${(masters.workers||[]).map(w=>`<option value="${w.id}" ${s.scheduleOperator==w.id?'selected':''}>${esc(w.name)} (${esc(w.team||'-')})</option>`).join('')}`;
      modal=`<div style="position:fixed;inset:0;background:#000a;z-index:200;display:flex;align-items:center;justify-content:center;padding:16px" onclick="if(event.target===this)closeSchBarModal()">
        <div style="background:#161b22;border:1px solid #30363d;border-radius:14px;padding:18px;width:340px;max-width:96vw">
          <h3 style="color:#e2e8f0;margin:0 0 12px;font-size:14px">📅 予定編集</h3>
          <div style="background:#0d1117;border:1px solid #21262d;border-radius:7px;padding:8px;margin-bottom:10px">
            <div style="color:#94a3b8;font-size:11px">${esc(o.product||o.seiban||'')} × ${parseInt(o.qty)||0}個</div>
            <div style="color:#475569;font-size:10px;margin-top:2px">${esc(s.name||'')} / 🔧 ${esc(machineName(r.machineId))}</div>
            ${isHidden?`<div style="color:#f59e0b;font-size:10px;margin-top:4px">⚠️ 現在ガントチャートで非表示中</div>`:''}
          </div>
          ${isHidden?`
          <button onclick="showSchBar()" style="width:100%;background:#052e16;border:1px solid #10b981;color:#10b981;border-radius:7px;padding:10px;font-weight:700;font-size:12px;margin-bottom:10px">🔄 予定を再表示する</button>
          `:`
          <div style="margin-bottom:10px">
            <label class="lbl">担当者（予定）</label>
            <select id="sch-op" style="width:100%">${opOpts}</select>
          </div>
          <div style="margin-bottom:10px">
            <label class="lbl">開始日</label>
            <input id="sch-start" type="date" value="${esc(s.scheduleStart||todayStr())}" style="width:100%">
          </div>
          <div style="margin-bottom:14px">
            <label class="lbl">加工順序（同一機械内）</label>
            <input id="sch-order" type="number" min="0" value="${s.scheduleOrder||0}" style="width:100%">
          </div>
          <div style="display:flex;gap:8px">
            <button onclick="closeSchBarModal()" class="btn-d" style="flex:1">キャンセル</button>
            <button onclick="hideSchBar()" style="flex:1;background:#1a0a0a;border:1px solid #ef4444;color:#f87171;border-radius:7px;padding:9px;font-weight:700;font-size:12px">❌ 予定を消す</button>
            <button onclick="saveSchBarEdit()" class="btn-p" style="flex:2">保存</button>
          </div>
          `}
          ${isHidden?`<button onclick="closeSchBarModal()" class="btn-d" style="width:100%;margin-top:8px">閉じる</button>`:''}
        </div>
      </div>`;
    }
  }

  return`<div class="up">
    <div class="hdr">
      <span style="font-weight:800;color:#e2e8f0">📅 予定表</span>
      <div style="display:flex;gap:6px;align-items:center">
        <button onclick="set({schViewMode:'load'})" style="background:${S.schViewMode==='load'?'#052e16':'#161b22'};border:1px solid ${S.schViewMode==='load'?'#10b981':'#21262d'};border-radius:7px;color:${S.schViewMode==='load'?'#10b981':'#64748b'};padding:5px 10px;font-size:11px;font-weight:700">📊 負荷</button>
        <button onclick="set({schViewMode:'worker'})" style="background:#1e1b4b;border:1px solid #4338ca;border-radius:7px;color:#a78bfa;padding:5px 10px;font-size:11px;font-weight:700">👷 担当者別</button>
        <button onclick="set({schShowDone:!S.schShowDone})" style="background:${S.schShowDone?'#052e16':'#161b22'};border:1px solid ${S.schShowDone?'#10b98150':'#21262d'};border-radius:7px;color:${S.schShowDone?'#10b981':'#64748b'};padding:5px 10px;font-size:11px;font-weight:700">${S.schShowDone?'✅完了含む':'完了を隠す'}</button>
      </div>
    </div>
    <div class="wrap">
      <div class="card" style="padding:8px;margin-bottom:10px">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
          ${teams.map(t=>`<button onclick="set({schTeam:'${t}'})" style="background:${S.schTeam===t?'linear-gradient(135deg,#4f46e5,#7c3aed)':'#0d1117'};border:1px solid ${S.schTeam===t?'#6366f1':'#21262d'};border-radius:7px;color:${S.schTeam===t?'#fff':'#94a3b8'};padding:6px 12px;font-size:11px;font-weight:700">${t}</button>`).join('')}
        </div>
        <!-- 期間ナビゲーション：2行レイアウト（モバイル崩れ防止） -->
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
          <button onclick="set({schStart:'${navPrev}'})" style="background:#0d1117;border:1px solid #21262d;border-radius:6px;color:#94a3b8;padding:5px 12px;font-size:13px;flex-shrink:0">◀</button>
          <span style="color:#94a3b8;font-size:11px;flex:1;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${periodLabel}</span>
          <button onclick="set({schStart:'${navNext}'})" style="background:#0d1117;border:1px solid #21262d;border-radius:6px;color:#94a3b8;padding:5px 12px;font-size:13px;flex-shrink:0">▶</button>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <select onchange="set({schPeriod:parseInt(this.value)})" style="background:#0d1117;border:1px solid #21262d;border-radius:6px;color:#94a3b8;padding:5px 8px;font-size:11px;flex:1;min-width:80px">
            ${periods.map(([d,l])=>`<option value="${d}" ${S.schPeriod==d?'selected':''}>${l}</option>`).join('')}
          </select>
          <button onclick="set({schStart:'${today}'})" style="background:#1e1b4b;border:1px solid #4338ca;border-radius:6px;color:#a78bfa;padding:5px 14px;font-size:11px;font-weight:700;flex-shrink:0">本日</button>
        </div>
      </div>
      <!-- 製品フィルタパネル -->
      ${(()=>{
        const visOrders=orders.filter(o=>S.schShowDone||!isDone(o));
        const hiddenCount=(S.schProductFilter||[]).length;
        const headerBg=hiddenCount>0?'background:#1e1b4b;border:1px solid #4338ca':'background:#161b22;border:1px solid #21262d';
        const headerColor=hiddenCount>0?'#a78bfa':'#64748b';
        return`<div style="${headerBg};border-radius:9px;margin-bottom:10px;overflow:hidden">
          <button onclick="set({schFilterOpen:!S.schFilterOpen})" style="width:100%;background:none;border:none;padding:9px 12px;display:flex;align-items:center;gap:8px;text-align:left">
            <span style="color:${headerColor};font-size:12px;font-weight:700">🔍 製品フィルタ</span>
            ${hiddenCount>0?`<span style="background:#4338ca;color:#fff;border-radius:99px;padding:1px 8px;font-size:10px;font-weight:700">${hiddenCount}件非表示</span>`:`<span style="color:#475569;font-size:10px">${visOrders.length}件全表示</span>`}
            <span style="margin-left:auto;color:#475569;font-size:11px">${S.schFilterOpen?'▲':'▼'}</span>
          </button>
          ${S.schFilterOpen?`
          <div style="border-top:1px solid #21262d;padding:10px 12px">
            <div style="display:flex;gap:6px;margin-bottom:8px">
              <button onclick="schFilterSelectAll()" style="background:#052e16;border:1px solid #10b98150;border-radius:6px;color:#10b981;padding:4px 10px;font-size:11px;font-weight:700">✅ 全て表示</button>
              <button onclick="schFilterClearAll()" style="background:#2d0a0a;border:1px solid #ef444450;border-radius:6px;color:#f87171;padding:4px 10px;font-size:11px;font-weight:700">❌ 全て非表示</button>
            </div>
            <div style="display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto">
              ${visOrders.length===0?`<p style="color:#475569;font-size:11px">表示する受注がありません</p>`:''}
              ${visOrders.map(o=>{
                const hidden=(S.schProductFilter||[]).includes(o.id);
                const fin=calcOrderFinish(o);
                const ov=overallRatio(o);
                const statusIcon=fin.status==='over'?'🚨':fin.status==='warn'?'⚠️':fin.status==='ok'?'✅':'📭';
                return`<label style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:${hidden?'#0d1117':'#1e293b'};border:1px solid ${hidden?'#21262d':'#334155'};border-radius:7px;cursor:pointer;opacity:${hidden?0.5:1}">
                  <input type="checkbox" ${hidden?'':'checked'} onchange="toggleSchProduct(${o.id})" style="width:16px;height:16px;flex-shrink:0">
                  <span style="font-size:10px">${statusIcon}</span>
                  <div style="flex:1;min-width:0">
                    <div style="display:flex;gap:5px;align-items:center">
                      <span style="color:#6366f1;font-size:9px;font-weight:700;flex-shrink:0">${esc(o.seiban)||'―'}</span>
                      <span style="color:#e2e8f0;font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(o.product)||'―'}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
                      <div style="flex:1;height:3px;background:#0d1117;border-radius:99px;overflow:hidden"><div style="height:100%;width:${Math.min(ov*100,100)}%;background:${sc(ov)};border-radius:99px"></div></div>
                      <span style="color:#475569;font-size:9px;flex-shrink:0">${o.deadline?fmt(o.deadline):'納期未設定'}</span>
                    </div>
                  </div>
                </label>`;
              }).join('')}
            </div>
          </div>`:''}
        </div>`;
      })()}
      <div class="card" style="padding:0;overflow:hidden">
        <!-- 機械列（左）と日付グリッド（右）を横並びにし、日付グリッドだけスクロール -->
        <div style="display:flex;align-items:stretch">
          <!-- 機械列ヘッダー＋行：固定幅、スクロールしない -->
          <div style="width:${machineColW}px;flex-shrink:0;border-right:2px solid #30363d;z-index:20;background:#0d1117">
            <!-- ヘッダー -->
            <div style="height:${rowH-10}px;padding:6px 8px;border-bottom:2px solid #30363d;display:flex;align-items:center">
              <span style="color:#94a3b8;font-size:11px;font-weight:700">機械</span>
            </div>
            <!-- 機械名行 -->
            ${machinesSorted.map(m=>`
            <div style="height:${rowH}px;padding:6px 8px;border-bottom:1px solid #21262d;display:flex;flex-direction:column;justify-content:center">
              <div style="color:#e2e8f0;font-size:11px;font-weight:700;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.name)}</div>
              <div style="display:flex;align-items:center;gap:4px;margin-top:2px">
                ${m.type?`<span style="color:#475569;font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.type)}</span>`:''}
                ${m.team?`<span style="background:${TEAM_COLORS[m.team]||'#334155'};color:#fff;font-size:8px;font-weight:700;padding:0 5px;border-radius:99px;flex-shrink:0">${esc(m.team)}</span>`:''}
              </div>
            </div>`).join('')}
          </div>
          <!-- 日付グリッド：横スクロール -->
          <div style="flex:1;overflow-x:auto;min-width:0">
            <!-- 日付ヘッダー -->
            <div style="display:flex;border-bottom:2px solid #30363d;background:#0d1117;position:sticky;top:0;z-index:15">
              ${dayHeaderHTML}
            </div>
            <!-- 機械ごとのバー行 -->
            ${machinesSorted.map(m=>{
              const myBars=barsByMachine[String(m.id)]||[];
              const cellsBG=dayHeaders.map(d=>{
                const dt=new Date(d);
                const isWeekend=dt.getDay()===0||dt.getDay()===6;
                const isHoliday=holidaySet.has(d);
                const isToday=d===today;
                const isOff=isWeekend||isHoliday;
                return`<div class="sch-cell" data-mid="${esc(m.id)}" data-date="${d}" style="width:${cellW}px;flex-shrink:0;height:${rowH}px;border-right:1px solid #21262d;border-bottom:1px solid #21262d;background:${isToday?'#1e1b4b22':isHoliday?'#450a0a30':isOff?'#0d111780':'transparent'}"></div>`;
              }).join('');
              const barsHTML=myBars.map(b=>{
                const offset=dayDiff(start,b.start);
                if(offset+b.days<0||offset>=days)return'';
                const left=Math.max(offset,0)*cellW;
                const clipLeft=offset<0?Math.abs(offset):0;
                const visibleDays=Math.min(b.days-clipLeft,days-Math.max(offset,0));
                if(visibleDays<=0)return'';
                const w=visibleDays*cellW-3;
                const wn=workerName(b.scheduleOperator);
                const opName=wn||'未定';
                const workerTeam=(workerById(b.scheduleOperator)||{}).team||'';
                const teamColor=wn?(TEAM_COLORS[workerTeam]||'#64748b'):'#64748b';
                const productColor=getProductColor(b.orderId);
                const qty=parseInt(b.order.qty)||0;
                const done=isDone(b.order);
                const overdue=b.order.deadline&&dayDiff(today,b.order.deadline)<0&&!done;
                const targetDate=b.order.deadline?addDays(b.order.deadline,-30):'';
                const missTarget=targetDate&&b.endDate&&b.endDate>targetDate&&!done;
                const bg=done?'rgba(16,185,129,.15)':overdue?'linear-gradient(135deg,#7f1d1d,#dc2626)':`linear-gradient(135deg,${productColor}dd,${productColor}88)`;
                const borderColor=done?'#10b981':overdue?'#ef4444':productColor;
                return`<div class="sch-bar"
                  data-oid="${b.orderId}" data-gk="${b.gk}" data-sid="${b.stepId}" data-mid="${esc(b.machineId)}"
                  title="${esc(b.order.product||b.order.seiban||'')} 完了予定:${b.endDate||''} (${b.workdays||''}稼働日)${missTarget?' ⚠️1ヶ月前目標未達':''}${overdue?' 🚨納期超過':''}"
                  style="position:absolute;left:${left}px;top:3px;width:${w}px;height:${rowH-6}px;background:${bg};border:2px solid ${borderColor};border-radius:6px;padding:2px 5px 2px 7px;font-size:10px;cursor:grab;color:#fff;overflow:hidden;display:flex;flex-direction:column;justify-content:center;z-index:5;box-shadow:${missTarget?'0 0 0 2px #f59e0b':'none'};touch-action:none;user-select:none">
                  <div style="font-weight:800;font-size:10px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                    ${esc(b.order.product||b.order.seiban||'未設定')}×${qty}
                    ${missTarget?'<span style="font-size:8px;background:#f59e0b;color:#000;border-radius:3px;padding:0 3px;margin-left:2px;font-weight:900">⚠️遅れ</span>':''}
                    ${overdue?'<span style="font-size:8px;background:#ef4444;color:#fff;border-radius:3px;padding:0 3px;margin-left:2px;font-weight:900">超過</span>':''}
                  </div>
                  <div style="font-size:8px;line-height:1.2;color:#fff;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                    <span style="background:${teamColor};color:#fff;border-radius:2px;padding:0 3px;font-size:7px;font-weight:700;margin-right:3px">${workerTeam||'未定'}</span>${esc(opName)} / ${esc(b.step.name||'')}
                  </div>
                  ${b.endDate?`<div style="font-size:8px;color:#fff;opacity:.7;white-space:nowrap">〜${b.endDate.slice(5).replace('-','/')}完了予定</div>`:''}
                </div>`;
              }).join('');
              return`<div style="position:relative;display:flex;height:${rowH}px">
                ${cellsBG}
                ${barsHTML}
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
      <div class="card" style="padding:8px;margin-top:8px">
        ${S.schMoving
          ?`<div style="background:#92400e;border:1px solid #fbbf24;border-radius:7px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between">
              <span style="color:#fbbf24;font-size:12px;font-weight:700">📌 移動中：行き先の日をタップして確定</span>
              <button onclick="cancelSchMove()" style="background:#0d1117;border:1px solid #fbbf24;color:#fbbf24;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700">キャンセル</button>
            </div>`
          :`<p style="color:#475569;font-size:10px;margin:0">💡 バーをタップで選択 → 移動したい日をタップで移動 / もう一度バーをタップで編集モード</p>`
        }
    </div>
    ${modal}
  </div>`;
}

/* 予定表のバークリック・ドラッグハンドラ */
window.openSchBarModal=(oid,gk,sid,mid)=>{
  S.schBarRef={orderId:oid,gk,stepId:sid,machineId:mid};
  S.schBarModal=true;render();
};
window.closeSchBarModal=()=>{S.schBarModal=false;S.schBarRef=null;render();};

/* 🔄 予定を再表示：scheduleHiddenフラグをfalseに戻す */
window.showSchBar=()=>{
  const r=S.schBarRef;if(!r)return;
  orders=orders.map(o=>{
    if(o.id!=r.orderId)return o;
    const newG=(o[r.gk]||[]).map(s=>{
      if(s.id!=r.stepId)return s;
      return{...s,scheduleHidden:false};
    });
    return{...o,[r.gk]:newG};
  });
  persist();
  S.schBarModal=false;S.schBarRef=null;render();
};
window.hideSchBar=()=>{
  const r=S.schBarRef;if(!r)return;
  if(!confirm('この予定をガントチャートから消しますか？\n（受注データは残ります。再表示はバーをタップ→「予定を表示」から）'))return;
  orders=orders.map(o=>{
    if(o.id!=r.orderId)return o;
    const newG=(o[r.gk]||[]).map(s=>{
      if(s.id!=r.stepId)return s;
      return{...s,scheduleHidden:true};
    });
    return{...o,[r.gk]:newG};
  });
  persist();
  S.schBarModal=false;S.schBarRef=null;render();
};
window.saveSchBarEdit=async()=>{
  const r=S.schBarRef;if(!r)return;
  try{
    const opEl=document.getElementById('sch-op');
    const stEl=document.getElementById('sch-start');
    const orEl=document.getElementById('sch-order');
    const newOp=opEl?opEl.value:'';
    const newStart=stEl?stEl.value:'';
    const newOrder=orEl?(orEl.value===''?'':parseInt(orEl.value)||0):'';
    orders=orders.map(o=>{
      if(o.id!=r.orderId)return o;
      const newG=(o[r.gk]||[]).map(s=>{
        if(s.id!=r.stepId)return s;
        /* scheduleOperatorとoperatorIdを同期させる（ガントと進捗画面の表示を一致させる） */
        return{...s,scheduleOperator:newOp,operatorId:newOp,scheduleStart:newStart,scheduleOrder:newOrder};
      });
      return{...o,[r.gk]:newG};
    });
    persist();
    S.schBarModal=false;S.schBarRef=null;render();
  }catch(e){alert('保存エラー: '+e.message);}
};

/* バーのドラッグ&ドロップ：同一機械内→開始日変更、別機械→machineId入替 */
/* ===== 予定表バー操作（タップ選択 → タップ移動）===== */
/* ドラッグAPIはスマホ非対応のため廃止。タップ2回方式に変更。
   1回目タップ：バーを選択（黄色くハイライト）
   2回目タップ（セル）：その日に移動確定
   キャンセル：もう一度バーをタップ or キャンセルボタン */

window.onSchBarTap=(oid,gk,sid,mid)=>{
  const mv=S.schMoving;
  if(mv&&mv.orderId==oid&&mv.stepId==sid&&mv.machineId===String(mid)){
    /* 同じバーを再タップ → 選択解除して編集モーダルを開く */
    S.schMoving=null;
    openSchBarModal(oid,gk,sid,mid);
    return;
  }
  /* バーを選択状態にする（移動待ち） */
  S.schMoving={orderId:oid,gk,stepId:sid,machineId:String(mid)};
  render();
};

window.onSchCellTap=(targetMid,targetDate)=>{
  const mv=S.schMoving;
  if(!mv)return;
  try{
    orders=orders.map(o=>{
      if(o.id!=mv.orderId)return o;
      const newG=(o[mv.gk]||[]).map(s=>{
        if(s.id!=mv.stepId)return s;
        const next={...s,scheduleStart:targetDate};
        if(String(targetMid)!==String(mv.machineId)){
          const ids=parseMachineIds(s.machineId);
          const idx=ids.indexOf(String(mv.machineId));
          if(idx>=0)ids[idx]=String(targetMid);
          else if(!ids.includes(String(targetMid)))ids.push(String(targetMid));
          next.machineId=stringifyMachineIds(Array.from(new Set(ids)));
        }
        return next;
      });
      return{...o,[mv.gk]:newG};
    });
    S.schMoving=null;
    persist();render();
  }catch(err){console.error('move error:',err);alert('移動失敗: '+err.message);}
};

/* ===== AIアドバイザー ===== */
/* 受注データを匿名化してAIに送る
   客先名: 送らない
   製番:  「製品A」「製品B」... に変換
   工程名・個数・進捗・納期: そのまま送る */
function buildAnonymizedContext(){
  try{
    const dh=calcDailyH()||8;
    const today=todayStr();
    const activeOrders=orders.filter(o=>!isDone(o));
    const lines=[];
    lines.push(`【工場基本情報】`);
    lines.push(`本日: ${today} / 1日稼働時間: ${dh}h`);
    lines.push(`進行中受注: ${activeOrders.length}件\n`);
    activeOrders.forEach((o,idx)=>{
      const label=`製品${String.fromCharCode(65+idx%26)}${idx>=26?Math.floor(idx/26):''}`;
      const qty=parseInt(o.qty)||0;
      const fin=calcOrderFinish(o);
      const finTxt=fin.status==='unset'?'予定未入力':fin.date?`${fin.date}(${fin.status})`:'不明';
      lines.push(`[${label}]`);
      lines.push(`  個数: ${qty}個 / 納期: ${o.deadline||'未設定'}`);
      lines.push(`  完了見込: ${finTxt}`);
      const allSteps=[...(o.group1||[]),...(o.group2||[])].filter(s=>hpuToHours(s)>0);
      allSteps.forEach(s=>{
        const rem=Math.max(0,qty-(parseInt(s.done)||0));
        const hpu=hpuToHours(s);
        const pct=qty>0?Math.round((parseInt(s.done)||0)/qty*100):0;
        lines.push(`  工程[${esc(s.name)}]: 残${rem}個 / 進捗${pct}% / 1個${hhmm(hpu)}`);
      });
      lines.push('');
    });
    return lines.join('\n');
  }catch(e){return '（データ取得エラー）';}
}

window.sendAI=async()=>{
  try{
    const inp=document.getElementById('ai-inp');
    if(!inp)return;
    const userText=inp.value.trim();
    if(!userText||S.aiLoading)return;

    /* APIキー確認 */
    let apiKey='';
    try{apiKey=localStorage.getItem('factory_ai_key')||'';}catch(e){}
    if(!apiKey){
      const noKeyMsg='⚠️ APIキーが未設定です。\n\n設定タブ → データ管理 → 🤖 AIアドバイザー設定\nからAnthropicのAPIキーを入力してください。\n\nhttps://console.anthropic.com でAPIキーを発行できます。';
      set({aiMessages:[...S.aiMessages,{role:'user',content:userText},{role:'assistant',content:noKeyMsg}],aiLoading:false});
      inp.value='';
      return;
    }

    inp.value='';
    const context=buildAnonymizedContext();
    const systemPrompt=`あなたは製造現場の工程管理の専門AIアドバイザーです。
ユーザーは製造工場の班長です。以下の【匿名化された工程データ】をもとに、具体的で実践的なアドバイスをしてください。

【ルール】
・回答は簡潔に。箇条書きを積極的に使う
・製品名はデータ通りの「製品A」「製品B」等で呼ぶ
・数字・日付を使って具体的に
・「〜だと思います」より「〜してください」「〜が有効です」等、現場で使える言葉で

【現在の工程データ（匿名化済み・社外秘情報は除外済み）】
${context}`;
    const newMessages=[...S.aiMessages,{role:'user',content:userText}];
    set({aiMessages:newMessages,aiLoading:true});
    setTimeout(()=>{const el=document.getElementById('ai-msgs');if(el)el.scrollTop=el.scrollHeight;},50);

    const apiMessages=newMessages.map(m=>({role:m.role,content:m.content}));
    let aborted=false;
    _aiAbort=()=>{aborted=true;};

    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body:JSON.stringify({
        model:'claude-opus-4-6',
        max_tokens:1000,
        system:systemPrompt,
        messages:apiMessages,
      })
    });
    if(aborted)return;
    if(!res.ok){
      let errMsg=`HTTP ${res.status}`;
      try{const err=await res.json();errMsg=err.error?.message||errMsg;}catch(_){}
      if(res.status===401)errMsg='APIキーが無効です。設定から正しいキーを再入力してください。';
      if(res.status===429)errMsg='APIの利用制限に達しました。しばらく待ってから再試行してください。';
      throw new Error(errMsg);
    }
    const data=await res.json();
    if(aborted)return;
    const assistantText=data.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'（応答なし）';
    const finalMessages=[...newMessages,{role:'assistant',content:assistantText}];
    set({aiMessages:finalMessages,aiLoading:false});
    _aiAbort=null;
    setTimeout(()=>{const el=document.getElementById('ai-msgs');if(el)el.scrollTop=el.scrollHeight;},50);
  }catch(e){
    console.error('AI error:',e);
    set({aiMessages:[...S.aiMessages,{role:'assistant',content:`⚠️ エラー: ${e.message}`}],aiLoading:false});
    _aiAbort=null;
  }
};
let _schDrag=null;
let _ptrDrag=null; /* Pointer Eventsベースのドラッグ状態 */

/* ========== ガントチャート Pointer Eventsドラッグ（モジュール起動時に1回だけ登録） ==========
   HTML5 DragAPIはスマホでゴースト位置がずれるため、Pointer Eventsで完全実装する。
   - pointerdown: ドラッグ開始を記録
   - pointermove: クローン表示 + ターゲットセルをハイライト（左端基準）
   - pointerup: ターゲットセルにドロップ確定
   ================================================================== */
(function initGanttPointerDrag(){
  /* クローン要素を生成 */
  function createClone(d){
    const clone=document.createElement('div');
    clone.id='sch-drag-clone';
    clone.innerHTML=d.barHTML;
    clone.style.cssText=[
      'position:fixed','pointer-events:none','z-index:9999',
      `background:${d.barBg}`,'opacity:0.88',
      `border:2px solid ${d.barBorder}`,'border-radius:6px',
      `width:${Math.min(d.barW,260)}px`,'overflow:hidden',
      'padding:4px 8px','font-size:10px','color:#fff',
      'box-shadow:0 6px 24px rgba(0,0,0,.6)',
      'display:flex','flex-direction:column','gap:2px',
    ].join(';');
    document.body.appendChild(clone);
    return clone;
  }
  /* ハイライト解除 */
  function clearHighlight(d){
    if(d&&d.lastCell){
      d.lastCell.style.background='';d.lastCell.style.outline='';
      d.lastCell=null;
    }
  }
  /* ハイライト設定 */
  function setHighlight(d,cell){
    clearHighlight(d);
    cell.style.background='rgba(99,102,241,.4)';
    cell.style.outline='2px solid #818cf8';
    d.lastCell=cell;
  }

  document.addEventListener('pointermove',e=>{
    if(!_ptrDrag)return;
    const dx=e.clientX-_ptrDrag.startX,dy=e.clientY-_ptrDrag.startY;
    if(!_ptrDrag.started&&Math.sqrt(dx*dx+dy*dy)>8){
      _ptrDrag.started=true;
      _ptrDrag.clone=createClone(_ptrDrag);
    }
    if(!_ptrDrag.started)return;
    /* クローンはバーの左端を指の位置に合わせる */
    const clone=_ptrDrag.clone;
    if(clone){
      clone.style.left=e.clientX+'px';
      clone.style.top=(e.clientY-clone.offsetHeight/2)+'px';
    }
    /* クローンを一時非表示にしてポインタ下の要素を取得 */
    if(clone)clone.style.display='none';
    const el=document.elementFromPoint(e.clientX,e.clientY);
    if(clone)clone.style.display='flex';
    const cell=el&&(el.classList.contains('sch-cell')?el:el.closest('.sch-cell'));
    if(cell){
      setHighlight(_ptrDrag,cell);
      /* クローン上部に「この日付から開始」インジケータを更新 */
      if(clone){
        let ind=clone.querySelector('.drag-ind');
        if(!ind){ind=document.createElement('div');ind.className='drag-ind';ind.style.cssText='font-size:9px;background:rgba(0,0,0,.6);border-radius:3px;padding:2px 5px;margin-top:2px';clone.insertBefore(ind,clone.firstChild);}
        const d=cell.dataset.date||'';
        ind.textContent=d?`📅 ${d.slice(5).replace('-','/')} 開始`:'';
      }
    }else{
      clearHighlight(_ptrDrag);
    }
    e.preventDefault();
  },{passive:false});

  document.addEventListener('pointerup',e=>{
    if(!_ptrDrag)return;
    const d=_ptrDrag;_ptrDrag=null;
    if(d.clone)d.clone.remove();
    clearHighlight(d);
    if(!d.started){
      /* 移動なし → タップ扱い → モーダルを開く */
      openSchBarModal(d.orderId,d.gk,d.stepId,d.machineId);
      return;
    }
    /* ドロップ先のセルを特定 */
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const cell=el&&(el.classList.contains('sch-cell')?el:el.closest('.sch-cell'));
    if(!cell)return;
    const targetDate=cell.dataset.date;
    const targetMid=cell.dataset.mid;
    if(!targetDate)return;
    /* バーを移動して保存 */
    orders=orders.map(o=>{
      if(o.id!=d.orderId)return o;
      const newG=(o[d.gk]||[]).map(s=>{
        if(s.id!=d.stepId)return s;
        const next={...s,scheduleStart:targetDate};
        if(String(targetMid)!==String(d.machineId)){
          const ids=parseMachineIds(s.machineId);
          const idx=ids.indexOf(String(d.machineId));
          if(idx>=0)ids[idx]=String(targetMid);
          else if(!ids.includes(String(targetMid)))ids.push(String(targetMid));
          next.machineId=stringifyMachineIds(Array.from(new Set(ids)));
        }
        return next;
      });
      return{...o,[d.gk]:newG};
    });
    persist();render();
  });

  /* Escキーでキャンセル */
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'&&_ptrDrag){
      if(_ptrDrag.clone)_ptrDrag.clone.remove();
      clearHighlight(_ptrDrag);
      _ptrDrag=null;
    }
  });
})();

/* ===== EVENT BINDING ===== */
function bindEvents(){
  try{
    const $=id=>document.getElementById(id);
    const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};
    on('pw-inp','input',e=>{S.pw=e.target.value;});
    on('pw-inp','keydown',e=>{if(e.key==='Enter')tryLogin();});
    on('login-btn','click',tryLogin);
    on('back-btn','click',()=>set({view:'list'}));
    on('lock-btn','click',()=>set({locked:true,pw:'',pwErr:false}));
    /* データインポート（ファイル選択） */
    on('import-file','change',e=>{
      const f=e.target.files&&e.target.files[0];
      if(f)importDataFromFile(f);
      e.target.value=''; /* 同じファイルを再選択可能に */
    });
    /* 【ドラッグ改修】Pointer Eventsによるガントチャートドラッグ
       document.addEventListener(pointermove/pointerup)はinitGanttPointerDrag()で登録済み
       ここではbarのpointerdownのみ登録する */
    document.querySelectorAll('.sch-bar').forEach(bar=>{
      const oid=parseInt(bar.dataset.oid);
      const gk=bar.dataset.gk;
      const sid=parseInt(bar.dataset.sid);
      const mid=bar.dataset.mid;
      bar.addEventListener('pointerdown',e=>{
        /* 右クリック・中クリックは無視 */
        if(e.button&&e.button!==0)return;
        e.preventDefault();
        e.stopPropagation();
        /* ドラッグ開始情報を記録（移動しきい値は8px超えたら開始） */
        _ptrDrag={
          orderId:oid,gk,stepId:sid,machineId:String(mid),
          startX:e.clientX,startY:e.clientY,
          started:false,clone:null,lastCell:null,
          /* クローン描画用にバーの見た目を記録 */
          barW:bar.offsetWidth,
          barH:bar.offsetHeight,
          barBg:bar.style.background||'#6366f1',
          barBorder:bar.style.borderColor||'#818cf8',
          barHTML:bar.innerHTML,
        };
        bar.setPointerCapture(e.pointerId);
      });
    });
    on('new-btn','click',goNew);
    on('new-btn2','click',goNew);
    on('submit-btn','click',saveOrder);
    on('del-btn','click',()=>{if(S.eid)delOrder(S.eid);});
    on('edit-btn','click',()=>goEdit(orders.find(o=>o.id===S.eid)));
    on('edit-btn2','click',()=>goEdit(orders.find(o=>o.id===S.eid)));
    on('toggle-done','click',()=>set({showDone:!S.showDone}));
    on('toggle-caution','click',()=>set({showCautionOnly:!S.showCautionOnly}));
    /* 検索欄：_searchQをS外で管理することでrender()不要にし、フォーカス消失を防ぐ */
    const searchEl=document.getElementById('search-inp');
    if(searchEl){
      const applySearch=val=>{
        _searchQ=val;
        S.q=val; /* セッション保存用 */
        saveSession();
        render(); /* _searchQを使うためrender後もフォーカスは render()内で復元 */
      };
      let _searchTimer=null;
      searchEl.addEventListener('input',e=>{
        if(e.isComposing)return;
        _searchQ=e.target.value; /* まず即時更新（S.q更新前でもフィルタが効く） */
        clearTimeout(_searchTimer);
        _searchTimer=setTimeout(()=>applySearch(searchEl.value),200);
      });
      searchEl.addEventListener('compositionend',e=>{
        clearTimeout(_searchTimer);
        applySearch(e.target.value);
      });
      searchEl.addEventListener('keydown',e=>{
        if(e.key==='Escape'){clearTimeout(_searchTimer);applySearch('');}
      });
    }
    on('daily-date','change',e=>set({dailyDate:e.target.value}));
    /* 【指摘①】担当者別の残業時間入力 */
    document.querySelectorAll('.worker-ot').forEach(el=>{
      el.addEventListener('input',e=>{
        const wid=e.target.dataset.wid;
        updateDailyOvertime(wid,e.target.value);
        /* 合計の表示を即時更新（再描画を避けてフォーカス維持） */
        try{
          const d=getDailyNotes(S.dailyDate);
          const otMap=d.overtimeByWorker||{};
          const totalOt=Object.values(otMap).reduce((s,v)=>s+(parseFloat(v)||0),0);
          const wc=Object.keys(otMap).filter(k=>(parseFloat(otMap[k])||0)>0).length;
          /* ヘッダーカードの合計表示を更新 */
          const cards=document.querySelectorAll('.card');
          cards.forEach(c=>{
            const p=c.querySelector('p');
            if(p&&p.textContent.includes('本日の稼働時間')){
              const divs=c.querySelectorAll('div[style*="font-weight:900"]');
              if(divs.length>=2){
                divs[1].innerHTML=totalOt.toFixed(1)+'<span style="font-size:11px;color:#475569">h</span>';
                if(divs[2])divs[2].innerHTML=totalOt.toFixed(1)+'<span style="font-size:11px">h</span>';
              }
              const wcDivs=c.querySelectorAll('div[style*="color:#64748b"][style*="font-size:10px"][style*="margin-top:2px"]');
              if(wcDivs.length>=1)wcDivs[0].textContent=wc+'名';
            }
          });
          /* 入力欄の枠線色を更新 */
          const val=parseFloat(e.target.value)||0;
          const parent=e.target.closest('div[style*="border"]');
          if(parent)parent.style.borderColor=val>0?'#f59e0b60':'#21262d';
        }catch(err){console.error('update totals error:',err);}
      });
      el.addEventListener('focus',e=>e.target.select());
    });
    on('cal-type','change',e=>{S.calForm={...S.calForm,type:e.target.value};});
    on('cal-title','input',e=>{S.calForm={...S.calForm,title:e.target.value};});
    document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>set({groupBy:btn.dataset.group})));
    document.querySelectorAll('.order-row').forEach(row=>row.addEventListener('click',()=>set({view:'detail',eid:parseInt(row.dataset.id)})));
    document.querySelectorAll('.f-inp').forEach(el=>{
      /* IME対応：inputイベントではS.formを更新しない（変換途中の文字が入るため）
         compositionend（変換確定）とblur（フォーカス離脱）のみで確定値をS.formに保存 */
      const commitVal=e=>{
        const key=e.target.dataset.key;
        if(!key)return;
        S.form={...S.form,[key]:e.target.value};
        saveSession();
      };
      el.addEventListener('compositionend',commitVal);
      el.addEventListener('blur',commitVal);
      el.addEventListener('change',commitVal);
      el.addEventListener('focus',e=>{if(e.target.type==='number')e.target.select();});
    });
    document.querySelectorAll('.step-inp').forEach(el=>{
      el.addEventListener('input',e=>{
        if(e.isComposing||e.target.composing)return;
        const gk=e.target.dataset.gk;const idx=parseInt(e.target.dataset.idx);const field=e.target.dataset.field;
        if(!field)return;
        const steps=[...(S.form[gk]||[])];steps[idx]={...steps[idx],[field]:e.target.value};
        S.form={...S.form,[gk]:steps};
      });
      el.addEventListener('compositionend',e=>{
        const gk=e.target.dataset.gk;const idx=parseInt(e.target.dataset.idx);const field=e.target.dataset.field;
        if(!field)return;
        const steps=[...(S.form[gk]||[])];steps[idx]={...steps[idx],[field]:e.target.value};
        S.form={...S.form,[gk]:steps};
      });
      el.addEventListener('blur',e=>{
        /* blurでも確定（IMEキャンセル後の値漏れ防止） */
        const gk=e.target.dataset.gk;const idx=parseInt(e.target.dataset.idx);const field=e.target.dataset.field;
        if(!field)return;
        const steps=[...(S.form[gk]||[])];steps[idx]={...steps[idx],[field]:e.target.value};
        S.form={...S.form,[gk]:steps};
      });
      el.addEventListener('change',e=>{
        const gk=e.target.dataset.gk;const idx=parseInt(e.target.dataset.idx);
        const steps=[...(S.form[gk]||[])];
        /* 【改修④】時間/個 値変更 */
        if(e.target.classList.contains('hpu-val')){
          const v=e.target.value;
          steps[idx]={...steps[idx],hoursPerUnit:v===''?'':parseFloat(v)};
          S.form={...S.form,[gk]:steps};
          return;
        }
        /* 【改修④】時間/個 単位変更（h↔日） */
        if(e.target.classList.contains('hpu-unit')){
          steps[idx]={...steps[idx],hoursPerUnitUnit:e.target.value};
          S.form={...S.form,[gk]:steps};
          return;
        }
        const field=e.target.dataset.field;
        if(!field)return;
        steps[idx]={...steps[idx],[field]:e.target.value};
        S.form={...S.form,[gk]:steps};
      });
      el.addEventListener('focus',e=>{if(e.target.type==='number')e.target.select();});
    });
    /* 【改修③】機械種別チップ（複数トグル） */
    document.querySelectorAll('.mc-type-chip').forEach(btn=>{
      btn.addEventListener('click',e=>{
        const gk=e.target.dataset.gk;const idx=parseInt(e.target.dataset.idx);const t=e.target.dataset.type;
        const steps=[...(S.form[gk]||[])];
        const cur=Array.isArray(steps[idx]._filterTypes)?[...steps[idx]._filterTypes]:[];
        const i=cur.indexOf(t);
        if(i>=0)cur.splice(i,1);else cur.push(t);
        steps[idx]={...steps[idx],_filterTypes:cur};
        S.form={...S.form,[gk]:steps};
        render();
      });
    });
    document.querySelectorAll('.mc-type-clear').forEach(btn=>{
      btn.addEventListener('click',e=>{
        const gk=e.target.dataset.gk;const idx=parseInt(e.target.dataset.idx);
        const steps=[...(S.form[gk]||[])];
        steps[idx]={...steps[idx],_filterTypes:[]};
        S.form={...S.form,[gk]:steps};
        render();
      });
    });
    /* 【改修③】機械チェックボックス（複数選択） */
    document.querySelectorAll('.mc-mid').forEach(chk=>{
      chk.addEventListener('change',e=>{
        const gk=e.target.dataset.gk;const idx=parseInt(e.target.dataset.idx);const mid=e.target.dataset.mid;
        const steps=[...(S.form[gk]||[])];
        const cur=parseMachineIds(steps[idx].machineId);
        const set=new Set(cur);
        if(e.target.checked)set.add(mid);else set.delete(mid);
        const newIds=Array.from(set);
        steps[idx]={...steps[idx],machineId:stringifyMachineIds(newIds),machineCount:Math.max(newIds.length,1)};
        S.form={...S.form,[gk]:steps};
        render();
      });
    });
    /* 【指摘C修正】日付プルダウンの変更をS.formに即座に反映 */
    document.querySelectorAll('.date-sel').forEach(sel=>{
      sel.addEventListener('change',e=>{
        const prefix=e.target.dataset.prefix;
        const formKey=e.target.dataset.formkey;
        if(!prefix||!formKey)return;
        const val=getDateVal(prefix);
        /* 全フィールド選択済みになって初めてS.formに入れる */
        S.form={...S.form,[formKey]:val||''};
      });
    });
    document.querySelectorAll('[data-toggle]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const k=btn.dataset.toggle;const v=btn.dataset.val==='true';
        S.form={...S.form,[k]:!v};render();
      });
    });
    document.querySelectorAll('.step-prog').forEach(inp=>{
      /* 入力中は保存せず、確定時(change/blur)のみ保存→再描画
         inputイベントで即render()するとフォーカスが外れて多桁入力できないため */
      inp.addEventListener('change',e=>{
        const oid=parseInt(e.target.dataset.oid);
        const gk=e.target.dataset.gk;
        const sid=parseInt(e.target.dataset.sid);
        updStepDone(oid,gk,sid,e.target.value);
      });
      inp.addEventListener('blur',e=>{
        const oid=parseInt(e.target.dataset.oid);
        const gk=e.target.dataset.gk;
        const sid=parseInt(e.target.dataset.sid);
        updStepDone(oid,gk,sid,e.target.value);
      });
      inp.addEventListener('focus',e=>e.target.select());
    });
    document.querySelectorAll('.step-actual').forEach(inp=>{
      inp.addEventListener('input',e=>{
        const oid=parseInt(e.target.dataset.oid);
        const gk=e.target.dataset.gk;
        const sid=parseInt(e.target.dataset.sid);
        updStepActual(oid,gk,sid,e.target.value);
      });
      inp.addEventListener('focus',e=>e.target.select());
    });
    /* 手直しカウンター */
    document.querySelectorAll('.step-rework').forEach(inp=>{
      inp.addEventListener('change',e=>{
        const oid=parseInt(e.target.dataset.oid);
        const gk=e.target.dataset.gk;
        const sid=parseInt(e.target.dataset.sid);
        updStepRework(oid,gk,sid,e.target.value);
      });
      inp.addEventListener('blur',e=>{
        const oid=parseInt(e.target.dataset.oid);
        const gk=e.target.dataset.gk;
        const sid=parseInt(e.target.dataset.sid);
        updStepRework(oid,gk,sid,e.target.value);
      });
      inp.addEventListener('focus',e=>e.target.select());
    });
    document.querySelectorAll('.storage-inp').forEach(el=>{
      el.addEventListener('input',e=>{
        const place=e.target.dataset.place;
        const val=parseInt(e.target.value)||0;
        S.form={...S.form,storageQty:{...(S.form.storageQty||{}),[place]:val}};
      });
      el.addEventListener('focus',e=>e.target.select());
    });
    /* 【指摘⑤】置き場×ボタン（編集画面）: 値を0にクリア */
    document.querySelectorAll('.storage-del-form').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.preventDefault();
        const place=btn.dataset.place;
        if(!place)return;
        /* 入力欄を0にする */
        const inp=document.querySelector(`.storage-inp[data-place="${place}"]`);
        if(inp)inp.value='';
        /* S.form を更新 */
        const sq={...(S.form.storageQty||{})};
        delete sq[place];
        S.form={...S.form,storageQty:sq};
        render();
      });
    });
    /* 【指摘⑤】置き場×ボタン（詳細画面）: 即削除＆保存 */
    document.querySelectorAll('.storage-del-detail').forEach(btn=>{
      btn.addEventListener('click',e=>{
        e.preventDefault();
        const oid=parseInt(btn.dataset.oid);
        const place=btn.dataset.place;
        if(!oid||!place)return;
        if(!confirm(`「${place}」の置き場在庫を削除しますか？`))return;
        orders=orders.map(o=>{
          if(o.id!==oid)return o;
          const sq={...(o.storageQty||{})};
          delete sq[place];
          return{...o,storageQty:sq};
        });
        persist();render();
      });
    });
    if(S.wModal&&S.wForm){
      ['wf-name','wf-role','wf-team','wf-main'].forEach(id=>{
        const map={'wf-name':'name','wf-role':'role','wf-team':'team','wf-main':'mainMachineId'};
        on(id,'change',e=>{S.wForm={...S.wForm,[map[id]]:e.target.value};});
        on(id,'input',e=>{S.wForm={...S.wForm,[map[id]]:e.target.value};});
      });
      document.querySelectorAll('.sk-machine').forEach(el=>{el.addEventListener('change',e=>{const idx=parseInt(e.target.dataset.idx);const sk=[...(S.wForm.skills||[])];sk[idx]={...sk[idx],machineId:e.target.value};S.wForm={...S.wForm,skills:sk};});});
      document.querySelectorAll('.sk-level').forEach(el=>{el.addEventListener('change',e=>{const idx=parseInt(e.target.dataset.idx);const sk=[...(S.wForm.skills||[])];sk[idx]={...sk[idx],level:parseInt(e.target.value)};S.wForm={...S.wForm,skills:sk};});});
    }
    document.querySelectorAll('[id^="memo-"]').forEach(el=>{
      el.addEventListener('input',e=>{
        const id=parseInt(e.target.id.replace('memo-',''));
        const d=getDailyNotes(S.dailyDate);
        d.meetings=(d.meetings||[]).map(m=>m.id==id?{...m,text:e.target.value}:m);
        saveDailyNotes(S.dailyDate,d);
      });
    });
    const atb=$('alarm-toggle-btn');
    if(atb)atb.textContent=alarmEnabled?'アラームOFF':'アラームON';
  }catch(e){console.error('bindEvents error:',e);}
}

function tryLogin(){if(S.pw===PASS){set({locked:false,pwErr:false});}else{set({pwErr:true,pw:''});}}

/* ===== APP INIT ===== */
(async()=>{
  document.getElementById('app').innerHTML=
    '<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:14px">' +
    '<div style="font-size:32px;animation:spin 2s linear infinite">⚙️</div>' +
    '<div style="color:#818cf8;font-size:14px;font-weight:700;letter-spacing:2px">読み込み中...</div>' +
    '</div>';
  try{
    const[o,m,t,c,dn]=await Promise.all([
      apiGet(SK),apiGet(MK),apiGet(TK),apiGet(CK),
      apiGet(DK+'_'+S.dailyDate)
    ]);
    if(m&&typeof m==='object'){
      /* 古い overtime フィールドは無視 */
      if(m.workSettings&&'overtime' in m.workSettings)delete m.workSettings.overtime;
      /* 既存データに12:00-12:45の休憩が無ければ自動追加 */
      if(m.workSettings)m.workSettings=migrateBreaks(m.workSettings);
      masters=m;
      /* マイグレーションが発生したら自動保存 */
      saveMasters();
    }
    if(t)timeDB=t;
    if(Array.isArray(o))orders=o.map(migrate);
    if(Array.isArray(c))calEvents=c;
    _dc[S.dailyDate]=dn||{meetings:[],overtimeByWorker:{}};
    /* データロード完了後にセッション状態を復元
       （ordersが揃ってから復元しないとformのeid参照が壊れるため最後に実行） */
    restoreSession();
    _searchQ=S.q||''; /* セッション復元後、検索欄の状態を同期 */
  }catch(e){console.error('[init] error:',e);}
  loadAlarmSetting();
  render();
  checkAlarm();
  startAlarmTimer();
})();
</script>
